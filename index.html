    S('diff-right-header').innerHTML = `Modular ${mode === 'custom' ? '<span class="badge badge-custom shadow-sm ms-1" style="font-size:9px">CUSTOM</span>' : '<span class="badge bg-secondary shadow-sm ms-1" style="font-size:9px">CORE</span>'}`;
    S('diff-html-target').innerHTML = '<div class="p-5 text-secondary text-center mt-5"><i class="fa-solid fa-spinner fa-spin fa-3x mb-3"></i><br>Formatiere Code & Erstelle smartes Diff...</div>';
    
    await new Promise(r => setTimeout(r, 20));

    let normS1 = currentS1; let normS2 = currentS2;
    try {
        if (normS1.trim()) normS1 = await prettier.format(normS1, prettierOpts);
        if (normS2.trim()) normS2 = await prettier.format(normS2, prettierOpts);
    } catch (e) { console.warn("Prettier Formatierung fehlgeschlagen.", e); }

    if (normS1 === normS2) {
        S('diff-html-target').innerHTML = importWarningsHtml + `
            <div class="alert alert-success m-3 bg-dark border-success text-success d-flex align-items-center gap-2 shadow-sm"><i class="fa-solid fa-check-circle"></i> <strong>Code ist identisch</strong> (reine Formatierungsunterschiede wurden bereinigt und ignoriert).</div>
            <div class="p-3" style="background: #0d1117;"><pre><code class="language-javascript" style="background: transparent;">${escapeHtml(normS1)}</code></pre></div>`;
        hljs.highlightElement(S('diff-html-target').querySelector('code'));
        return;
    }

    const diffString = Diff.createTwoFilesPatch("Original", "Modular", normS1, normS2, "", "", { context: 99999 });
    S('diff-html-target').innerHTML = importWarningsHtml; 
    const configuration = { drawFileList: false, matching: 'words', outputFormat: 'side-by-side', renderNothingWhenEmpty: false, colorScheme: 'dark' };

    const diff2htmlUi = new Diff2HtmlUI(S('diff-html-target'), diffString, configuration, hljs);
    diff2htmlUi.draw(); diff2htmlUi.highlightCode(); 

    if (mode === 'custom') {
        const style = document.createElement('style');
        style.innerHTML = `.d2h-ins { background-color: rgba(142, 68, 173, 0.2) !important; border-color: #8e44ad !important; } .d2h-ins .d2h-code-line-ctn { color: #e2a3f8 !important; }`;
        S('diff-html-target').appendChild(style);
    }
}

function copyCode(paneId) {
    const textToCopy = paneId === 1 ? currentS1 : currentS2;
    navigator.clipboard.writeText(textToCopy).then(() => {
        const btn = document.getElementById('copyBtn' + paneId);
        const origHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Kopiert';
        btn.classList.add('text-success', 'border-success');
        setTimeout(() => { btn.innerHTML = origHtml; btn.classList.remove('text-success', 'border-success'); }, 2000);
    });
}

function createRow(indent, icon, text, status, extInfo = null, color = 'var(--bs-secondary)', isCustom = false, extraBadges = '', nodeId = '') {
    const d = document.createElement('div'); 
    d.className = 'tree-row' + (status === 'N' ? ' row-new-modular' : ''); 
    d.style.paddingLeft = `${(indent * 20) + 10}px`;
    d.setAttribute('data-node-id', nodeId || text); 
    
    const statusColor = { N: 'var(--bs-secondary)', D: 'var(--bs-danger)', C: 'var(--bs-warning)', E: 'transparent' }[status];
    const custB = isCustom ? `<span class="badge badge-custom shadow-sm ms-2" style="font-size:9px; padding: 3px 5px;" title="Eigenes Projekt-Customizing"><i class="fa-solid fa-wrench"></i> CUSTOM</span>` : '';
    
    let iconHtml = icon === 'ext-icon' ? `<span class="icon-col" style="color: ${color}"><span style="display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px; border:1.5px solid currentColor; border-radius:50%; font-size:8px; line-height:1;"><i class="fa-solid fa-ellipsis"></i></span></span>` : `<i class="fa-solid ${icon} icon-col" style="color: ${color}"></i>`;
    d.innerHTML = `<i class="fa-solid fa-caret-down toggle-icon" style="visibility: hidden;"></i><span class="status-dot" style="background:${statusColor}; border:${status==='E'?'1px solid var(--bs-secondary)':'none'}"></span>${iconHtml}<span>${text} ${custB} ${extraBadges}</span>`;
    return d;
}

S('resizer').onmousedown = () => { document.onmousemove = e => S('pane1').style.flex = `0 0 ${Math.max(10, Math.min(90, ((e.clientX - 380) / (window.innerWidth - 380)) * 100))}%`; document.onmouseup = () => document.onmousemove = null; };
</script>
</body>
