async function buildData(project, entName) {
    if (!project) return { entity: null, context: null, views: [] };
    const entLower = entName.toLowerCase(); const ctxName = project.contextMap.get(entLower);
    let res = { entity: new TreeNode(entName, "entity", null, 'root_ent'), context: null, views: [] };
    
    let allowedViews = project.contextViews.get(entLower) || new Set();

    for (const [key, fileObj] of project.files.entries()) {
        if (!key.endsWith('.aod') || key.includes('modification/')) continue;
        
        if (key.includes(`/${entLower}.aod`) || key.includes(`/${entLower}_entity/`)) {
            const xml = await project.readXml(fileObj.fullPath);
            if (xml && xml.nodeName === 'entity') { res.entity.file = fileObj; await extractNodeDataAsync(xml, res.entity, project); }
            if (xml) await parseWalkerAsync(xml, res.entity, fileObj, false, project);
        } else if (ctxName && key.includes(`neoncontext/${ctxName.toLowerCase()}.aod`)) {
            const xml = await project.readXml(fileObj.fullPath);
            if(xml) { res.context = new TreeNode(ctxName, "neonContext", fileObj, 'root_ctx'); await extractNodeDataAsync(xml, res.context, project); }
        } else if (key.includes('neonview/')) {
            let vName = path.basename(fileObj.fullPath, '.aod');
            let isAllowed = Array.from(allowedViews).some(v => v.toLowerCase() === vName.toLowerCase());
            if (isAllowed) {
                const xml = await project.readXml(fileObj.fullPath);
                if(xml) { 
                    let vn = new TreeNode(vName, "neonView", fileObj, 'view_'+vName); vn.rawXml = xml; 
                    let isModCust = Array.from(project.customViewsMod).some(v => v.toLowerCase() === vName.toLowerCase());
                    if(isModCust) vn.isCustom = true;
                    vn.refContexts = Array.from(getRefsCI(project.viewRefs, vName));
                    await extractNodeDataAsync(xml, vn, project); res.views.push(vn); 
                }
            }
        }
    }

    if (project.name === "Modular") {
        for (const [key, fileObj] of project.files.entries()) {
            if (key.includes('modification/') && key.endsWith('.aod')) {
                const xml = await project.readXml(fileObj.fullPath);
                if (xml) {
                    const modTarget = xml.getElementsByTagName('modelName')[0]?.textContent;
                    if(modTarget) {
                        if (modTarget.toLowerCase() === entLower) await applyModAsync(xml, res.entity, fileObj, project);
                        else { 
                            let targetView = findCaseInsensitive(res.views, modTarget);
                            if(targetView) { targetView.isCustom = !fileObj.path.includes('node_modules'); } 
                        }
                    }
                }
            }
        }
    }
    return res;
}

function getDeepValue(node) {
    if (!node) return ""; 
    let elements = Array.from(node.childNodes).filter(n => n.nodeType === 1 && n.nodeName === 'element');
    if (elements.length > 0) return elements.map(el => el.textContent.trim()).join('|');
    
    let children = Array.from(node.childNodes).filter(n => n.nodeType === 1 && n.nodeName !== 'name');
    if (children.length === 0) {
        let v = node.textContent.trim();
        if (v === "") {
            if (node.hasAttribute('v')) v = node.getAttribute('v');
            else if (node.hasAttribute('value')) v = node.getAttribute('value');
        }
        return v;
    }
    return getDeepValue(children[0]);
}

async function extractNodeDataAsync(xml, targetNode, project) {
    for(let c of Array.from(xml.childNodes)) {
        if (c.nodeType === 1 && c.nodeName !== 'name' && !IGNORE_AS_PROPS.has(c.nodeName)) {
            let val = "";
            let elements = Array.from(c.childNodes).filter(n => n.nodeType === 1 && n.nodeName === 'element');
            
            if (elements.length > 0) {
                val = elements.map(el => el.textContent.trim()).join('|');
            } else if (c.firstElementChild) {
                val = Array.from(c.childNodes).filter(sub => sub.nodeType===1 && sub.nodeName!=='name').map(sub => {
                    let subVal = sub.textContent.trim();
                    if(subVal==="" && sub.hasAttribute('v')) subVal = sub.getAttribute('v');
                    if(subVal==="" && sub.hasAttribute('value')) subVal = sub.getAttribute('value');
                    return `${sub.nodeName}: ${subVal}`;
                }).join(' | ');
            } else {
                val = c.textContent.trim();
                if (val === "") { 
                    if (c.hasAttribute('v')) val = c.getAttribute('v'); 
                    else if (c.hasAttribute('value')) val = c.getAttribute('value'); 
                }
            }
            
            if (ADITO_PROCESS_NAMES.has(c.nodeName)) {
                targetNode.procs[c.nodeName] = val; 
                let procPath = val; let f = null;
                if (procPath === 'process.js' || procPath === './process.js') f = Array.from(project.files.values()).find(fl => fl.fullPath === path.join(path.dirname(targetNode.file.fullPath), 'process.js'));
                else f = project.findFile(procPath);
                
                if(f) {
                    let content = await project.readText(f.fullPath); targetNode.procContents[c.nodeName] = content;
                }
            } else targetNode.props[c.nodeName] = val;
        }
    }
}

async function parseWalkerAsync(xml, parentTree, fileObj, isCustom, project) {
    for(let c of Array.from(xml.childNodes)) {
        if (c.nodeType !== 1) continue;
        let nodeNameLower = c.nodeName.toLowerCase();
        let isExt = nodeNameLower.includes('extensionpoint') || 
            (nodeNameLower !== 'entityservicedefinition' && nodeNameLower !== 'entityactiongroup' && Array.from(c.childNodes).some(n => n.nodeName.toLowerCase() === 'implementations'));
        
        if (isExt) {
            let baseType = c.nodeName.replace('ExtensionPoint', ''); let impls = Array.from(c.childNodes).find(n => n.nodeName === 'implementations');
            if(impls && impls.firstElementChild) baseType = impls.firstElementChild.nodeName;
            const name = c.getElementsByTagName('name')[0]?.textContent || c.nodeName;
            let ext = new TreeNode(name, baseType, fileObj, parentTree.id + '_' + name); ext.isExt = true; parentTree.children.push(ext);
            if(impls) await parseWalkerAsync(impls, ext, fileObj, isCustom, project); continue;
        }
        if (XML_WRAPPERS.has(c.nodeName)) { await parseWalkerAsync(c, parentTree, fileObj, isCustom, project); continue; }
        const nameNode = Array.from(c.childNodes).find(n => n.nodeName === 'name');
        if (nameNode && !IGNORE_AS_PROPS.has(c.nodeName)) {
            let type = c.nodeName; if(type.endsWith('RecordContainer')) type = 'recordContainer'; if(type.endsWith('RecordFieldMapping') || type === 'consumerMapping') type = 'recordFieldMapping';
            let node = new TreeNode(nameNode.textContent.trim(), type, fileObj, parentTree.id + '_' + nameNode.textContent.trim());
            node.isCustom = isCustom;
            if(parentTree.type === 'ExtensionPoint') node.isExt = true;
            await extractNodeDataAsync(c, node, project); parentTree.children.push(node); await parseWalkerAsync(c, node, fileObj, isCustom, project);
        }
    }
}

async function applyModAsync(xml, rootTree, fileObj, project) {
    const cType = xml.getElementsByTagName('changeType')[0]?.textContent; const pathTxt = xml.getElementsByTagName('path')[0]?.textContent || "";
    const pathParts = pathTxt.split('/').filter(p => !XML_WRAPPERS.has(p) && p.toLowerCase() !== rootTree.name.toLowerCase());
    const isCustom = !fileObj.path.includes('node_modules');
    const findNode = (pathArr) => { 
        let curr = rootTree; 
        for(let p of pathArr) { 
            let next = findCaseInsensitive(curr.children, p); 
            if(!next) return null; curr = next; 
        } 
        return curr; 
    };

    if (cType === 'MODIFY') {
        const propName = pathParts.pop(); let target = findNode(pathParts);
        if(target) {
            let valNode = xml.getElementsByTagName('value')[0]; let val = valNode ? getDeepValue(valNode) : "";
            
            if (Object.keys(target.coreProps).length === 0) Object.assign(target.coreProps, target.props);

            if(ADITO_PROCESS_NAMES.has(propName)) {
                target.coreProcContents[propName] = target.procContents[propName];
                target.coreProcs[propName] = target.procs[propName];
                target.procs[propName] = val; 
                let f = project.findFile(val); if(f) {
                    let content = await project.readText(f.fullPath); target.procContents[propName] = content;
                }
                if(isCustom) target.customProcs.add(propName);
            } else {
                target.props[propName] = val;
                if(isCustom) target.customProps.add(propName);
            }
        }
    } else if (cType === 'INSERT') {
        const wrappers = xml.getElementsByTagName('modelValueWrapper');
        if (wrappers.length > 0 && wrappers[0].firstElementChild) {
            let inner = Array.from(wrappers[0].childNodes).find(n => n.nodeName === 'value');
            if(inner && inner.firstElementChild) { let target = findNode(pathParts) || rootTree; await parseWalkerAsync(inner, target, fileObj, isCustom, project); }
        }
    } else if (cType === 'DELETE') { let target = findNode(pathParts); if(target) target.isDeleted = true; }
}

function normalizeStr(s) { return (s||"").replace(/\s+/g, ''); }
function sortProcs(a,b) { let iA = ADITO_PROCESS_NAMES_ARR.indexOf(a); let iB = ADITO_PROCESS_NAMES_ARR.indexOf(b); if(iA===-1) iA=999; if(iB===-1) iB=999; return iA - iB; }

function getDeepUniqueCount(oNodes, mNodes) {
    let uniqueElements = new Set();
    function traverse(nodes) {
        (nodes || []).forEach(n => {
            if (!n.isExt) uniqueElements.add(n.name.toLowerCase());
            if (n.isExt && n.children) traverse(n.children);
        });
    }
    traverse(oNodes); traverse(mNodes);
    return uniqueElements.size;
}

// --- RENDER HIERARCHY ---
function renderTree() {
    let isTpl = state.compareMode === 'template';
    let leftData = isTpl ? state.templateData : state.origData;
    let rightData = isTpl ? state.origData : state.modData;
    
    if(!leftData || !rightData) return;

    const cont = S('tree-container'); cont.innerHTML = '';
    let ctxNodeOrig = leftData.context, ctxNodeMod = rightData.context;
    let entNodeOrig = leftData.entity, entNodeMod = rightData.entity;
    let rootWrap = document.createElement('div'); let parentInd = 0;

    let ignoreTitle = S('ignoreTitleToggle') && S('ignoreTitleToggle').checked;

    let viewsSub = document.createElement('div'); viewsSub.className = 'tree-sub';
    let viewsHasC = false, viewsHasP = false;
    if (leftData.views.length > 0 || rightData.views.length > 0) {
        let vNames = getUniqueNamesCI(leftData.views, rightData.views);
        vNames.sort((a,b)=>a.localeCompare(b)).forEach(vn => { 
            let childWrap = createUiNode(findCaseInsensitive(leftData.views, vn), findCaseInsensitive(rightData.views, vn), parentInd+1);
            let cSt = childWrap.querySelector('.tree-row').dataset.st;
            if(cSt === 'C' || cSt === 'D' || cSt === 'N') viewsHasC = true;
            if(cSt === 'P') viewsHasP = true;
            viewsSub.appendChild(childWrap); 
        });
    }

    let entSt = 'E'; let ePO = {...entNodeOrig?.props}; let ePM = {...entNodeMod?.props};
    if (ignoreTitle) { delete ePO.title; delete ePM.title; }
    
    if(JSON.stringify(ePO) !== JSON.stringify(ePM)) entSt = 'C';
    else {
        let allEntProcs = new Set([...Object.keys(entNodeOrig?.procContents||{}), ...Object.keys(entNodeMod?.procContents||{})]);
        for(let p of allEntProcs) { if(normalizeStr(entNodeOrig?.procContents[p]) !== normalizeStr(entNodeMod?.procContents[p])) { entSt = 'P'; break; } }
    }

    let entSub = document.createElement('div'); entSub.className = 'tree-sub';
    let entHasC = false, entHasP = false;

    let entPNames = new Set([...Object.keys(entNodeOrig?.procs||{}), ...Object.keys(entNodeMod?.procs||{})]);
    if(entPNames.size > 0) {
        let hdrId = 'hdr_entprocs';
        let hdr = createUiRow(parentInd+1, 'fa-cogs', `Entity Processes <span class="badge bg-dark border text-light ms-2" style="font-size:10px">${entPNames.size}</span>`, 'E', false, false, '#c9d1d9', hdrId);
        hdr.classList.add('group-header'); if(!state.treeState.expanded.has(hdrId)) hdr.classList.add('collapsed');
        let procSub = document.createElement('div'); procSub.className = 'tree-sub';
        
        [...entPNames].sort(sortProcs).forEach(p => {
            let pst = 'E', op = entNodeOrig?.procContents[p], mp = entNodeMod?.procContents[p]; 
            if(!op && mp) { pst = 'N'; entHasP = true; } else if(op && !mp) { pst = 'D'; entHasP = true; } else if(normalizeStr(op) !== normalizeStr(mp)) { pst = 'C'; entHasP = true; }
            let isProcCustom = entNodeMod?.customProcs?.has(p) || false;
            let pr = createUiRow(parentInd+2, 'fa-code', p, pst, isProcCustom, false, '#58a6ff', entNodeOrig.id+'_'+p, "");
            pr.classList.add('no-children'); pr.style.fontStyle = 'italic';
            pr.onclick = (e) => { e.stopPropagation(); activateRow(pr); loadDiff(p, entNodeOrig?.procs[p], entNodeMod?.procs[p], entNodeMod, entNodeOrig); };
            procSub.appendChild(pr);
        });
        hdr.onclick = () => hdr.classList.toggle('collapsed');
        entSub.appendChild(hdr); entSub.appendChild(procSub);
    }

    DESIGNER_ORDER.forEach(gType => {
        let oNodes = entNodeOrig?.children.filter(c => c.type === gType || (gType==='recordContainer' && c.type.endsWith('RecordContainer'))) || [];
        let mNodes = entNodeMod?.children.filter(c => c.type === gType || (gType==='recordContainer' && c.type.endsWith('RecordContainer'))) || [];
        
        let allN = getUniqueNamesCI(oNodes, mNodes); 
        if(allN.length === 0) return;

        let totalCount = getDeepUniqueCount(oNodes, mNodes);

        let conf = UI_CONFIG[gType] || { i: 'fa-folder', c: '#8b949e', l: gType }; let hdrId = 'hdr_' + gType;
        let hdr = createUiRow(parentInd+1, conf.i, `${conf.l} <span class="badge bg-dark border text-light ms-2" style="font-size:10px">${totalCount}</span>`, 'E', false, false, conf.c, hdrId);
        hdr.classList.add('group-header'); if(!state.treeState.expanded.has(hdrId)) hdr.classList.add('collapsed');

        let sub = document.createElement('div'); sub.className = 'tree-sub';
        allN.sort((a,b)=>a.localeCompare(b)).forEach(n => { 
            let childWrap = createUiNode(findCaseInsensitive(oNodes, n), findCaseInsensitive(mNodes, n), parentInd+2); 
            let cSt = childWrap.querySelector('.tree-row').dataset.st;
            if(cSt === 'C' || cSt === 'D' || cSt === 'N') entHasC = true;
            if(cSt === 'P') entHasP = true;
            sub.appendChild(childWrap); 
        });
        hdr.onclick = () => hdr.classList.toggle('collapsed'); entSub.appendChild(hdr); entSub.appendChild(sub);
    });

    if (entSt === 'E' || entSt === 'P') {
        if (entHasC) entSt = 'C'; else if (entHasP && entSt === 'E') entSt = 'P';
    }

    if (ctxNodeOrig || ctxNodeMod) {
        let cO = ctxNodeOrig, cM = ctxNodeMod; let act = cM || cO;
        let st = 'E'; if(!cO && cM) st = 'N'; else if(cO && !cM) st = 'D'; 
        else {
            let oP = {...cO?.props}; let mP = {...cM?.props};
            if (ignoreTitle) { delete oP.title; delete mP.title; }
            if(JSON.stringify(oP)!==JSON.stringify(mP)) st = 'C';
        }
        if (st === 'E' || st === 'P') {
            if (entSt === 'C' || viewsHasC) st = 'C';
            else if ((entSt === 'P' || viewsHasP) && st === 'E') st = 'P';
        }
        
        let isCtxCustom = cM?.isCustom || false;
        let ctxExtraHtml = "";
        if (!isCtxCustom && hasCustomModDescendant(cM) && !isTpl) {
            ctxExtraHtml += `<i class="fa-solid fa-wrench ms-2" style="color: #d2a8ff; opacity: 0.8; font-size: 10px;" title="Enthält Modifikationen"></i>`;
        }
        
        let cRow = createUiRow(0, UI_CONFIG.neonContext.i, act.name, st, isCtxCustom && !isTpl, false, UI_CONFIG.neonContext.c, act.id, ctxExtraHtml);
        cRow.onclick = () => { activateRow(cRow); showProps(cO, cM); }; rootWrap.appendChild(cRow); parentInd = 1;
    }

    let isEntCustom = entNodeMod?.isCustom || false;
    let entExtraHtml = "";
    if (!isEntCustom && hasCustomModDescendant(entNodeMod) && !isTpl) {
        entExtraHtml += `<i class="fa-solid fa-wrench ms-2" style="color: #d2a8ff; opacity: 0.8; font-size: 10px;" title="Enthält Modifikationen"></i>`;
    }
    
    let rRow = createUiRow(parentInd, UI_CONFIG.entity.i, entNodeOrig.name, entSt, isEntCustom && !isTpl, false, UI_CONFIG.entity.c, entNodeOrig.id, entExtraHtml);
    rRow.classList.add('no-children'); 
    rRow.onclick = () => { activateRow(rRow); showProps(entNodeOrig, entNodeMod); }; 
    rootWrap.appendChild(rRow);
    
    Array.from(entSub.childNodes).forEach(n => rootWrap.appendChild(n));
    cont.appendChild(rootWrap);

    if (viewsSub.childNodes.length > 0) {
        let vSt = 'E'; if (viewsHasC) vSt = 'C'; else if (viewsHasP) vSt = 'P';
        let hdrId = 'hdr_views'; let hdr = createUiRow(parentInd, UI_CONFIG.neonView.i, `Views`, vSt, false, false, UI_CONFIG.neonView.c, hdrId);
        hdr.classList.add('group-header'); if(!state.treeState.expanded.has(hdrId)) hdr.classList.add('collapsed');
        hdr.onclick = () => hdr.classList.toggle('collapsed'); cont.appendChild(hdr); cont.appendChild(viewsSub);
    }
    
    if(state.treeState.activeId) { let aEl = document.querySelector(`[data-id="${state.treeState.activeId}"]`); if(aEl) aEl.click(); }
}

function createUiNode(o, m, indent) {
    let act = m || o; let st = 'E'; let ignoreTitle = S('ignoreTitleToggle') && S('ignoreTitleToggle').checked;
    let isTpl = state.compareMode === 'template';
    
    let propChanged = false; let procChanged = false;
    if(!o && m) { st = 'N'; propChanged = true; } else if(o && !m) { st = 'D'; propChanged = true; } else if(m?.isDeleted) { st = 'D'; propChanged = true; }
    else {
        let oProps = {...o?.props}; let mProps = {...m?.props};
        if (ignoreTitle) { delete oProps.title; delete mProps.title; }
        if(JSON.stringify(oProps)!==JSON.stringify(mProps)) propChanged = true;
        
        let allP = new Set([...Object.keys(o?.procContents||{}), ...Object.keys(m?.procContents||{})]);
        for(let p of allP) { if(normalizeStr(o?.procContents[p]) !== normalizeStr(m?.procContents[p])) { procChanged = true; break; } }
        
        if(!propChanged && act.type === 'neonView') { 
            let oTpls = extractTemplates(o?.rawXml); let mTpls = extractTemplates(m?.rawXml);
            if(JSON.stringify(oTpls) !== JSON.stringify(mTpls)) propChanged = true;
        }
        if(propChanged) st = 'C'; else if(procChanged) st = 'P';
    }

    let isCust = m?.isCustom || false; let isExt = m?.isExt || o?.isExt || false;
    let conf = UI_CONFIG[act.type] || { i: 'fa-cube', c: '#8b949e' }; if(isExt) conf = UI_CONFIG.ExtensionPoint;
    
    let cNames = getUniqueNamesCI(o?.children, m?.children);
    let pNames = new Set([...Object.keys(o?.procs||{}), ...Object.keys(m?.procs||{})]);
    
    let sub = document.createElement('div'); sub.className = 'tree-sub';
    let childHasC = false, childHasP = false;

    [...pNames].sort(sortProcs).forEach(p => {
        let pst = 'E', op = o?.procContents[p], mp = m?.procContents[p]; 
        if(!op && mp) { pst = 'N'; childHasP = true; } else if(op && !mp) { pst = 'D'; childHasP = true; } else if(normalizeStr(op) !== normalizeStr(mp)) { pst = 'C'; childHasP = true; }
        
        let isProcCustom = m?.customProcs?.has(p) || false;
        let pr = createUiRow(indent+1, 'fa-code', p, pst, isProcCustom && !isTpl, false, '#58a6ff', act.id+'_'+p, "");
        pr.classList.add('no-children'); pr.style.fontStyle = 'italic';
        pr.onclick = (e) => { e.stopPropagation(); activateRow(pr); loadDiff(p, o?.procs[p], m?.procs[p], m, o); };
        sub.appendChild(pr);
    });

    cNames.sort((a,b)=>a.localeCompare(b)).forEach(cn => { 
        let childWrap = createUiNode(findCaseInsensitive(o?.children, cn), findCaseInsensitive(m?.children, cn), indent+1);
        let cSt = childWrap.querySelector('.tree-row').dataset.st;
        if(cSt === 'C' || cSt === 'D' || cSt === 'N') childHasC = true;
        if(cSt === 'P') childHasP = true;
        sub.appendChild(childWrap); 
    });

    if (st === 'E' || st === 'P') {
        if (childHasC) { st = 'C'; }
        else if (childHasP && st === 'E') { st = 'P'; }
    }

    let extraHtml = "";
    if (!isCust && hasCustomModDescendant(m) && !isTpl) {
        extraHtml += `<i class="fa-solid fa-wrench ms-2" style="color: #d2a8ff; opacity: 0.8; font-size: 10px;" title="Enthält Modifikationen"></i>`;
    }

    if(act.type === 'neonView') {
        let activeProjLeft = isTpl ? projTemplate : projOrig;
        let activeProjRight = isTpl ? projOrig : projMod;
        let role = activeProjRight?.viewRoles?.[act.name] || activeProjLeft?.viewRoles?.[act.name];
        if(role) extraHtml += `<span class="badge bg-primary ms-2" style="font-size:9px">${role}</span>`;
        let refs = new Set([...getRefsCI(activeProjLeft?.viewRefs, act.name), ...getRefsCI(activeProjRight?.viewRefs, act.name)]).size;
        if(refs > 0) extraHtml += `<span class="badge bg-secondary ms-2" style="font-size:9px; border:1px solid #30363d;" title="Referenz-Zähler"><i class="fa-solid fa-link"></i> ${refs}</span>`;
    }

    let row = createUiRow(indent, conf.i, act.name, st, isCust && !isTpl, isExt, conf.c, act.id, extraHtml);
    if(!state.treeState.expanded.has(act.id)) row.classList.add('collapsed');

    if(sub.childNodes.length === 0) { row.classList.add('no-children'); row.onclick = () => { activateRow(row); showProps(o, m); }; } 
    else { row.onclick = (e) => { if(e.target.classList.contains('toggle-icon')) { e.stopPropagation(); row.classList.toggle('collapsed'); } else { activateRow(row); showProps(o, m); } }; }

    let wrap = document.createElement('div'); wrap.appendChild(row); wrap.appendChild(sub); return wrap;
}

function createUiRow(ind, ic, txt, st, cust, ext, col, id, extraHTML = "") {
    const d = document.createElement('div'); d.className = 'tree-row'; d.style.paddingLeft = `${(ind * 20) + 10}px`; if(id) d.dataset.id = id;
    d.dataset.st = st;
    const isDull = (st === 'E');
    let isTpl = state.compareMode === 'template';
    let diffCol = isTpl ? '#f85149' : '#d29922';

    let sC = 'transparent', bdr = 'none';
    if(st === 'N') sC = diffCol; 
    else if(st === 'D') sC = '#f85149'; 
    else if(st === 'C') sC = diffCol; 
    else if(st === 'P') { sC = 'transparent'; bdr = '2px solid ' + diffCol; } 
    else if(st === 'E') { sC = 'transparent'; bdr = '1px solid #30363d'; }

    const textCol = isDull ? '#8b949e' : '#c9d1d9'; const iconOp = isDull ? '0.6' : '1';
    const bC = cust ? `<span class="badge badge-custom shadow-sm ms-2" style="font-size:9px">CUSTOM</span>` : '';
    const bE = ext ? `<span class="badge shadow-sm ms-1 text-dark" style="font-size:9px; background-color:#ff79c6;">EXT</span>` : '';
    d.innerHTML = `<i class="fa-solid fa-caret-down toggle-icon"></i><span class="status-dot" style="background:${sC}; border:${bdr}; box-sizing: border-box;"></span><i class="fa-solid ${ic} icon-col" style="color:${col}; opacity:${iconOp};"></i><span class="node-text" style="color:${textCol};">${txt} ${bC} ${bE} ${extraHTML}</span>`;
    return d;
}

function toggleAllTree(exp) { document.querySelectorAll('.tree-row:not(.no-children), .group-header').forEach(r => r.classList.toggle('collapsed', !exp)); }
function activateRow(row) { document.querySelectorAll('.tree-row').forEach(r => r.classList.remove('active')); row.classList.add('active'); }

function setMode(mode) {
    state.currentMode = mode;
    S('btn-mode-core').className = mode === 'core' ? 'btn btn-secondary fw-bold' : 'btn btn-outline-secondary';
    S('btn-mode-custom').className = mode === 'custom' ? 'btn btn-custom fw-bold' : 'btn btn-outline-secondary';
    
    if (!S('props-view').classList.contains('d-none')) {
        let activeRow = document.querySelector('.tree-row.active');
        if (activeRow && activeRow.dataset.id) {
            let d = window._nodeRegistry[activeRow.dataset.id];
            if (d) showProps(d.o, d.m);
        }
    } else if (!S('diff-view-container').classList.contains('d-none')) {
        if (state.diffViewInfo) setDiffMode(mode);
    }
}

// --- PROPERTIES / DETAILS ---
function showProps(o, m) {
    S('props-view').classList.remove('d-none'); 
    S('diff-view-container').classList.add('d-none'); 
    S('diff-view-container').classList.remove('d-flex'); 
    S('diff-toolbar').classList.add('d-none'); 
    S('debug-banner').classList.add('d-none');

    let act = m || o; let conf = UI_CONFIG[act.type] || { i: 'fa-cube', c: '#8b949e' };
    if(act.isExt) conf = UI_CONFIG.ExtensionPoint;
    let isTpl = state.compareMode === 'template';
    
    let hasMods = m && (m.customProps.size > 0 || m.customProcs.size > 0 || m.isCustom);
    if(hasMods && !isTpl) S('mode-toggle').classList.remove('d-none'); else S('mode-toggle').classList.add('d-none');

    let b = (act.isCustom && !isTpl) ? `<span class="badge badge-custom ms-2">CUSTOM</span>` : '';
    S('view-title').innerHTML = `<i class="fa-solid ${conf.i} me-2" style="color:${conf.c}"></i> ${act.name} ${b}`;

    if(act.type === 'neonView') { renderViews(o, m); return; }

    const buildTable = (data, comp, isMod, realO, realM, specType) => {
        let type = specType || act.type;
        const dict = PROP_DICTIONARY[type] || { groups: {}, defaults: {} }; const defs = dict.defaults || {};
        let allDictProps = []; for(let g in dict.groups) allDictProps.push(...dict.groups[g]);
        let extraProps = new Set([...Object.keys(data), ...Object.keys(comp)]); allDictProps.forEach(p => extraProps.delete(p));
        
        let h = "";
        let rId = registerNodePair(realO, realM);

        const renderRow = (p) => {
            let v = data[p], cv = comp[p]; if(v===undefined && cv===undefined) v = defs[p];
            let isSet = data[p] !== undefined; 
            let propColor = isSet ? '#e6edf3' : '#6e7681'; let propWeight = isSet ? '600' : 'normal'; let valColor = isSet ? '#c9d1d9' : '#6e7681';
            let valH = v !== undefined ? escapeHtml(v) : ``;
            let diff = v !== cv && (data[p]!==undefined || comp[p]!==undefined);
            
            let isProc = ADITO_PROCESS_NAMES.has(p);
            let trAttrs = "";
            let rowHover = "prop-row";

            if (isProc && isSet) {
                let oC = realO?.procContents?.[p]; 
                let mC = undefined;
                if (realM) {
                    mC = (state.currentMode === 'core' && realM.coreProcContents.hasOwnProperty(p)) ? realM.coreProcContents[p] : realM.procContents[p];
                }

                let badgeTxt = 'Identisch', badgeCol = '#8b949e', icon = 'fa-check';
                if (oC && !mC) { badgeTxt = 'Entfernt'; badgeCol = '#f85149'; icon = 'fa-minus'; }
                else if (!oC && mC) { badgeTxt = 'Neu'; badgeCol = isTpl ? '#f85149' : '#3fb950'; icon = 'fa-plus'; }
                else if (normalizeStr(oC) !== normalizeStr(mC)) { badgeTxt = 'Geändert'; badgeCol = isTpl ? '#f85149' : '#d29922'; icon = 'fa-pen'; }
                
                valH = `<span class="badge" style="border: 1px solid ${badgeCol}; color: ${badgeCol}; background: transparent;"><i class="fa-solid ${icon}"></i> ${badgeTxt}</span>`;
                rowHover = "prop-row-interactive";
                trAttrs = `onclick="window.triggerDiffFromProp('${rId}', '${p}')" title="Klicken für Code-Diff"`;
                valColor = badgeCol;
            }

            let isCustomDiff = isMod && realM?.customProps.has(p) && state.currentMode === 'custom' && !isTpl;
            let bClass = diff && !isProc ? (isTpl ? "subtle-diff-border-template" : (isCustomDiff ? "subtle-diff-border-custom" : "subtle-diff-border")) : "";
            let tClass = diff && !isProc ? (isTpl ? 'text-template fw-bold' : (isCustomDiff ? 'text-custom fw-bold' : 'text-warning fw-bold')) : '';

            return `<tr class="${rowHover}" ${trAttrs}><td class="${bClass}" style="width:35%; border-color:#30363d; transition: background 0.1s;"><span style="color:${propColor}; font-weight:${propWeight};">${p}</span></td><td class="font-monospace text-break ${tClass}" style="border-color:#30363d; color:${diff && !isProc?'':valColor}; transition: background 0.1s;">${valH}</td></tr>`;
        };

        for(const [gName, pList] of Object.entries(dict.groups || {})) {
            let rows = pList.map(p => renderRow(p)).join(''); h += `<div class="prop-box"><div class="prop-box-header">${gName}</div><table class="table table-sm m-0" style="color:#c9d1d9; background:transparent;"><tbody>${rows}</tbody></table></div>`;
        }
        if(extraProps.size > 0) {
            let rows = [...extraProps].sort().map(p => renderRow(p)).join(''); h += `<div class="prop-box"><div class="prop-box-header">Extras</div><table class="table table-sm m-0" style="color:#c9d1d9; background:transparent;"><tbody>${rows}</tbody></table></div>`;
        }
        return h || `<div class="text-secondary p-3">Keine Properties definiert.</div>`;
    };

    let isOrigMissing = !o;
    let isModMissing = !m || m.isDeleted;
    
    let mPropsToUse = m ? (state.currentMode === 'core' && Object.keys(m.coreProps || {}).length > 0 ? m.coreProps : m.props) : {};

    let fH1 = `<h6 style="color:#8b949e; text-transform:uppercase; font-size:11px; margin-bottom:10px;">${isTpl ? 'Template Base' : 'Original Base'}</h6>`;
    let fH2 = `<h6 style="color:#8b949e; text-transform:uppercase; font-size:11px; margin-bottom:10px;">${isTpl ? 'Source Target' : 'Modular Target'} ${state.currentMode === 'core' && hasMods && !isTpl ? '(Core)' : ''}</h6>`;

    if (isOrigMissing && !isModMissing) {
        fH1 += `<div class="alert alert-info m-2 bg-dark text-info border-info d-flex align-items-center gap-2" style="font-size: 12px; background:#161b22 !important;"><i class="fa-solid fa-plus-circle"></i> Element existiert in Base nicht (Neu in Target).</div>`;
        fH2 += buildTable(mPropsToUse, mPropsToUse, true, o, m, act.type);
    } else if (!isOrigMissing && isModMissing) {
        fH1 += buildTable(o.props, o.props, false, o, m, act.type);
        fH2 += `<div class="alert alert-danger m-2 bg-dark text-danger border-danger d-flex align-items-center gap-2" style="font-size: 12px; background:#161b22 !important;"><i class="fa-solid fa-minus-circle"></i> Element existiert in Target nicht mehr (Gelöscht).</div>`;
    } else {
        fH1 += buildTable(o.props, mPropsToUse, false, o, m, act.type);
        fH2 += buildTable(mPropsToUse, o.props, true, o, m, act.type);
    }

    if (act.type === 'entity') {
        let leftData = isTpl ? state.templateData : state.origData;
        let rightData = isTpl ? state.origData : state.modData;
        let cO = leftData.context, cM = rightData.context;
        let cMProps = cM ? (state.currentMode === 'core' && Object.keys(cM.coreProps || {}).length > 0 ? cM.coreProps : cM.props) : {};

        if (cO || cM) {
            fH1 += `<div class="mt-4"><h6 style="color:#f78166; text-transform:uppercase; font-size:11px; margin-bottom:10px;"><i class="fa-solid fa-sitemap"></i> Context Info</h6>`;
            fH2 += `<div class="mt-4"><h6 style="color:#f78166; text-transform:uppercase; font-size:11px; margin-bottom:10px;"><i class="fa-solid fa-sitemap"></i> Context Info</h6>`;
            
            let isCtxOrigMissing = !cO;
            let isCtxModMissing = !cM || cM.isDeleted;

            if (isCtxOrigMissing && !isCtxModMissing) {
                fH1 += `<div class="alert alert-info m-2 bg-dark text-info border-info d-flex align-items-center gap-2" style="font-size: 12px; background:#161b22 !important;"><i class="fa-solid fa-plus-circle"></i> Kontext existiert in Base nicht (Neu).</div></div>`;
                fH2 += buildTable(cMProps, cMProps, true, cO, cM, 'neonContext') + `</div>`;
            } else if (!isCtxOrigMissing && isCtxModMissing) {
                fH1 += buildTable(cO.props, cO.props, false, cO, cM, 'neonContext') + `</div>`;
                fH2 += `<div class="alert alert-danger m-2 bg-dark text-danger border-danger d-flex align-items-center gap-2" style="font-size: 12px; background:#161b22 !important;"><i class="fa-solid fa-minus-circle"></i> Kontext existiert in Target nicht mehr.</div></div>`;
            } else {
                fH1 += buildTable(cO.props, cMProps, false, cO, cM, 'neonContext') + `</div>`;
                fH2 += buildTable(cMProps, cO.props, true, cO, cM, 'neonContext') + `</div>`;
            }
        }
    }

    S('pane1').innerHTML = fH1;
    S('pane2').innerHTML = fH2;
}

const p1 = S('pane1'), p2 = S('pane2'); let isSyncP1 = false, isSyncP2 = false;
p1.onscroll = () => { if(!isSyncP1) { isSyncP2 = true; p2.scrollTop = p1.scrollTop; } isSyncP1 = false; };
p2.onscroll = () => { if(!isSyncP2) { isSyncP1 = true; p1.scrollTop = p2.scrollTop; } isSyncP2 = false; };

function copyViewXml(side) { let xml = state.currentViewXml[side]; if(xml) navigator.clipboard.writeText(xml); }
function toggleAllTemplates(expand) {
    document.querySelectorAll('.view-tpl-table').forEach(tbl => { if(expand) tbl.classList.remove('d-none'); else tbl.classList.add('d-none'); });
    document.querySelectorAll('.tpl-chevron').forEach(i => { if(expand) i.classList.remove('collapsed'); else i.classList.add('collapsed'); });
}
function toggleTemplate(id, chevronId) { S(id).classList.toggle('d-none'); S(chevronId).classList.toggle('collapsed'); }

function generateTplTable(tpl, compTpl, isMod, actIsCustom) {
    let props = tpl.props; let compProps = compTpl ? compTpl.props : {};
    let allProps = new Set([...Object.keys(props), ...Object.keys(compProps)]);
    let tProps = "";
    let isTpl = state.compareMode === 'template';

    [...allProps].sort().forEach(p => {
        let v = props[p]; let cv = compProps[p];
        if(v === undefined && isMod) return; 
        let isDiff = v !== cv && (v!==undefined && cv!==undefined);
        let bClass = isDiff ? (isTpl ? "subtle-diff-border-template" : (isMod && actIsCustom ? "subtle-diff-border-custom" : "subtle-diff-border")) : "";
        let tClass = isDiff ? (isTpl ? 'text-template fw-bold' : (isMod && actIsCustom ? 'text-custom fw-bold' : 'text-warning fw-bold')) : '';
        let valH = v !== undefined ? escapeHtml(v) : ``;
        let valColor = (v === undefined) ? '#6e7681' : (isDiff ? '' : '#c9d1d9');
        tProps += `<tr><td class="${bClass}" style="width:30%; border-color:#30363d; color:#8b949e;">${p}</td><td class="font-monospace text-break ${tClass}" style="border-color:#30363d; color:${valColor};">${valH}</td></tr>`;
    });
    return tProps;
}

function renderViews(o, m) {
    state.currentViewXml = { 1: o?.rawXml?.outerHTML || "", 2: m?.rawXml?.outerHTML || "" };
    let act = m || o; 
    let isTpl = state.compareMode === 'template';
    let activeProjLeft = isTpl ? projTemplate : projOrig;
    let activeProjRight = isTpl ? projOrig : projMod;

    let refs = new Set([...getRefsCI(activeProjLeft?.viewRefs, act.name), ...getRefsCI(activeProjRight?.viewRefs, act.name)]);
    
    let refStr = `<div class="prop-box mb-3"><div class="prop-box-header text-info"><i class="fa-solid fa-link"></i> Referenziert von</div><div class="p-2" style="background:#161b22;">`;
    if(refs.size > 0) { refStr += [...refs].sort().map(c => `<span class="badge ${c.startsWith('Context:') ? 'bg-primary' : 'bg-secondary'} me-1 border border-secondary" style="font-size:11px;">${c}</span>`).join(''); } 
    else { refStr += `<span class="text-muted small">Keine bekannten Referenzen in diesem Projekt.</span>`; }
    refStr += `</div></div>`;

    let oTpls = extractTemplates(o?.rawXml); let mTpls = extractTemplates(m?.rawXml);

    const buildSide = (tplsMap, compTplsMap, side, isMod, actIsCustom, orderedNames) => {
        let h = `<div class="list-group list-group-flush rounded-1 border" style="border-color: #30363d !important;">`;
        if(orderedNames.length === 0) return h + `<div class="p-3 text-muted small">Keine Templates</div></div>`;
        
        orderedNames.forEach(tName => {
            let tpl = getTplCI(tplsMap.items, tName); let compTpl = getTplCI(compTplsMap.items, tName);
            let hash = Math.random().toString(36).substr(2, 9); let collapseId = 'tpl_' + side + '_' + hash; let chevronId = 'chev_' + side + '_' + hash;

            if(!tpl) { h += `<div class="list-group-item p-2" style="background:#161b22; border-color:#30363d; opacity:0.5;"><div class="text-danger fw-bold"><i class="fa-solid fa-minus"></i> Fehlt (in dieser Version)</div></div>`; return; }
            
            let type = tpl.type; 
            let isRef = (type === 'neonViewReference');
            let icon = isRef ? 'fa-link' : 'fa-layer-group';
            
            let titleCol = '#58a6ff'; 
            let refBadge = "";
            let itemStyle = "background:#161b22; border-color:#30363d;";
            
            if(isRef) {
                titleCol = '#8b949e'; 
                let entName = S('entitySelect').value.toLowerCase();
                let isInternal = activeProjRight?.contextViews.get(entName)?.has(tpl.originalName) || activeProjLeft?.contextViews.get(entName)?.has(tpl.originalName);
                
                if (isInternal) {
                    refBadge = `<span class="badge bg-dark border border-secondary text-secondary ms-2 fw-normal" style="font-size:9px;">Interne Referenz</span>`;
                } else {
                    refBadge = `<span class="badge bg-dark border border-warning text-warning ms-2 fw-normal" style="font-size:9px;">Externe Referenz</span>`;
                }
                itemStyle = "background:#0d1117; border-color:#30363d;"; 
            } else {
                refBadge = ""; 
            }

            let isDiff = false; if(!compTpl) isDiff = true; else if(JSON.stringify(tpl.props) !== JSON.stringify(compTpl.props)) isDiff = true;
            if(isDiff) {
                titleCol = isTpl ? '#f85149' : (isMod && actIsCustom ? '#d2a8ff' : '#d29922');
            }
            
            let tProps = generateTplTable(tpl, compTpl, isMod, actIsCustom);
            
            h += `<div class="list-group-item p-0 view-tpl-header" style="${itemStyle}">
                    <div class="p-2 d-flex align-items-center" onclick="toggleTemplate('${collapseId}', '${chevronId}')">
                        <i id="${chevronId}" class="fa-solid fa-chevron-down tpl-chevron collapsed me-2 text-secondary"></i>
                        <div><div class="fw-bold" style="color:${titleCol}"><i class="fa-solid ${icon} me-1"></i> ${tName} ${refBadge}</div><div class="small text-secondary font-monospace" style="font-size:10px;">${type}</div></div>
                    </div><table id="${collapseId}" class="table table-sm table-dark d-none m-0 view-tpl-table" style="font-size:11px; background:#0d1117;"><tbody>${tProps}</tbody></table>
                  </div>`;
        });
        return h + '</div>';
    };

    let mergedOrder = mergeTemplateOrders(oTpls.order, mTpls.order);
    let ctrlBar = `<div class="mb-2"><button class="btn btn-sm btn-outline-secondary py-0 me-1" onclick="toggleAllTemplates(true)"><i class="fa-solid fa-expand"></i> Alle</button><button class="btn btn-sm btn-outline-secondary py-0" onclick="toggleAllTemplates(false)"><i class="fa-solid fa-compress"></i> Alle</button></div>`;
    
    let isOrigMissing = !o;
    let isModMissing = !m || m.isDeleted;

    let origContent = "";
    let modContent = "";

    if (isOrigMissing && !isModMissing) {
        origContent = `<div class="alert alert-info m-2 bg-dark text-info border-info d-flex align-items-center gap-2" style="font-size: 12px; background:#161b22 !important;"><i class="fa-solid fa-plus-circle"></i> View existiert in Base nicht (Neu).</div>`;
        modContent = buildSide(mTpls, mTpls, 2, true, act.isCustom, mergedOrder);
    } else if (!isOrigMissing && isModMissing) {
        origContent = buildSide(oTpls, oTpls, 1, false, false, mergedOrder);
        modContent = `<div class="alert alert-danger m-2 bg-dark text-danger border-danger d-flex align-items-center gap-2" style="font-size: 12px; background:#161b22 !important;"><i class="fa-solid fa-minus-circle"></i> View existiert in Target nicht mehr (Gelöscht).</div>`;
    } else {
        origContent = buildSide(oTpls, mTpls, 1, false, false, mergedOrder);
        modContent = buildSide(mTpls, oTpls, 2, true, act.isCustom, mergedOrder);
    }

    let leftTitle = isTpl ? "Template Templates & Refs" : "Original Templates & Refs";
    let rightTitle = isTpl ? "Source Templates & Refs" : "Modular Templates & Refs";

    S('pane1').innerHTML = refStr + `<div class="d-flex justify-content-between align-items-center mb-2"><h6 class="m-0" style="color:#8b949e">${leftTitle}</h6><button class="btn btn-sm btn-outline-secondary py-0" onclick="copyViewXml(1)"><i class="fa-solid fa-code"></i> Copy XML</button></div>` + ctrlBar + origContent;
    S('pane2').innerHTML = refStr + `<div class="d-flex justify-content-between align-items-center mb-2"><h6 class="m-0" style="color:#8b949e">${rightTitle}</h6><button class="btn btn-sm btn-outline-secondary py-0" onclick="copyViewXml(2)"><i class="fa-solid fa-code"></i> Copy XML</button></div>` + ctrlBar + modContent;
}

// --- DIFF VIEW ---
function toggleDebugBanner() { S('debug-banner').classList.toggle('d-none'); }
function copyPath(side) { let p = S('debug-path-'+side).textContent; if(p && p!=='...') navigator.clipboard.writeText(p); }

async function loadDiff(pName, pOrig, pMod, targetNode, origNode) {
    S('props-view').classList.add('d-none'); 
    S('diff-view-container').classList.remove('d-none'); 
    S('diff-view-container').classList.add('d-flex'); 
    S('diff-toolbar').classList.remove('d-none'); 
    S('diff-toolbar').classList.add('d-flex');
    
    let isTpl = state.compareMode === 'template';
    
    S('view-title').innerHTML = `<i class="fa-solid fa-code me-2" style="color:#58a6ff"></i> Diff: ${pName}`;
    S('diff-html-target').innerHTML = '<div class="p-5 text-center" style="color:#58a6ff"><i class="fa-solid fa-circle-notch fa-spin fa-2x mb-2"></i><br>Lade Code...</div>';

    let cOrig = origNode?.procContents[pName] || ""; let cMod = targetNode?.procContents[pName] || ""; let cSource = targetNode?.coreProcContents[pName] || cMod; 
    S('debug-path-orig').textContent = pOrig || "Nicht vorhanden";
    
    let isCustomMod = targetNode?.customProcs.has(pName) || false;
    state.diffViewInfo = { origCode: cOrig, modCode: cMod, sourceCode: cSource, name: pName, pOrig: pOrig, pMod: pMod, isCustomMod: isCustomMod, targetNode: targetNode };
    
    if(isCustomMod && !isTpl) S('mode-toggle').classList.remove('d-none'); else S('mode-toggle').classList.add('d-none');
    setMode((isCustomMod && !isTpl) ? 'custom' : 'core');
}

async function reloadCurrentProcess() {
    if(state.diffViewInfo) {
        let isTpl = state.compareMode === 'template';
        let activeProjLeft = isTpl ? projTemplate : projOrig;
        let activeProjRight = isTpl ? projOrig : projMod;
        let { name, pOrig, pMod, targetNode } = state.diffViewInfo;
        
        if(pOrig) { let f = activeProjLeft.findFile(pOrig); if(f) state.diffViewInfo.origCode = await activeProjLeft.readText(f.fullPath); }
        if(pMod) { let f = activeProjRight.findFile(pMod); if(f) { state.diffViewInfo.modCode = await activeProjRight.readText(f.fullPath); targetNode.procContents[name] = state.diffViewInfo.modCode; } }
        setDiffMode(state.currentMode);
    }
}

async function setDiffMode(mode) {
    if(!state.diffViewInfo) return;

    let isTpl = state.compareMode === 'template';
    let rightName = isTpl ? "Source Target" : (mode==="custom" ? "Modular Target (Custom)" : "Modular Target (Core)");
    let leftName = isTpl ? "Template Base" : "Original Base";

    let c1 = state.diffViewInfo.origCode; let c2 = (mode === 'custom' && !isTpl) ? state.diffViewInfo.modCode : (isTpl ? state.diffViewInfo.modCode : state.diffViewInfo.sourceCode);
    let activeModPath = (mode === 'custom' && !isTpl) ? state.diffViewInfo.pMod : (state.diffViewInfo.targetNode?.coreProcs?.[state.diffViewInfo.name] || state.diffViewInfo.pMod);
    S('debug-path-mod').textContent = activeModPath || "Nicht vorhanden";

    let isRawMode = S('rawDiffToggle') && S('rawDiffToggle').checked;

    if (!c1 && c2) {
        S('diff-html-target').innerHTML = `<div class="alert alert-success m-3 flex-shrink-0 bg-dark border-success text-success d-flex align-items-center gap-2 shadow-sm" style="background:#161b22 !important;"><i class="fa-solid fa-plus-circle"></i> <strong>Neu in Target.</strong></div><div class="p-3 bg-dark flex-grow-1 overflow-auto" style="min-height:0;"><pre class="m-0"><code class="language-javascript" style="background: transparent;">${escapeHtml(c2)}</code></pre></div>`;
        hljs.highlightElement(S('diff-html-target').querySelector('code')); return;
    } else if (c1 && !c2) {
        S('diff-html-target').innerHTML = `<div class="alert alert-danger m-3 flex-shrink-0 bg-dark border-danger text-danger d-flex align-items-center gap-2 shadow-sm" style="background:#161b22 !important;"><i class="fa-solid fa-minus-circle"></i> <strong>Entfernt in Target.</strong></div><div class="p-3 bg-dark flex-grow-1 overflow-auto" style="min-height:0;"><pre class="m-0"><code class="language-javascript" style="background: transparent;">${escapeHtml(c1)}</code></pre></div>`;
        hljs.highlightElement(S('diff-html-target').querySelector('code')); return;
    }

    if (normalizeStr(c1) === normalizeStr(c2) && c1 !== "") {
        S('diff-html-target').innerHTML = `<div class="alert alert-success m-3 flex-shrink-0 bg-dark border-success text-success d-flex align-items-center gap-2 shadow-sm" style="background:#161b22 !important;"><i class="fa-solid fa-check-circle"></i> <strong>Code ist identisch.</strong></div><div class="p-3 bg-dark flex-grow-1 overflow-auto" style="min-height:0;"><pre class="m-0"><code class="language-javascript" style="background: transparent;">${escapeHtml(c1)}</code></pre></div>`;
        hljs.highlightElement(S('diff-html-target').querySelector('code')); return;
    }
    
    if (isRawMode) {
        const buildRawPane = (title, code, isLeft) => {
            let linesCount = (code || "").split('\n').length;
            let lineNums = '';
            for(let i=1; i<=linesCount; i++) lineNums += i + '\n';
            let borderClass = isLeft ? 'border-end border-secondary' : '';
            
            return `
            <div class="d-flex flex-column ${borderClass}" style="flex: 1 1 50%; min-width: 0;">
                <div class="bg-dark p-2 text-secondary fw-bold border-bottom border-secondary" style="font-size:11px;">${title}</div>
                <div class="bg-dark flex-grow-1 overflow-auto raw-diff-pane d-flex align-items-start" style="min-height:0; position:relative;">
                    <div class="text-secondary user-select-none text-end border-end border-secondary" style="padding: 1rem 0.5rem; min-width: 45px; font-size: 14px; font-family: var(--bs-font-monospace); line-height: 1.5; background: #0d1117; position: sticky; left: 0; z-index: 5; white-space: pre; opacity: 0.6;">${lineNums}</div>
                    <div style="padding: 1rem; width: max-content; min-width: calc(100% - 45px);">
                        <pre class="m-0" style="font-size: 14px; line-height: 1.5;"><code class="language-javascript" style="background: transparent; padding: 0;">${escapeHtml(code)}</code></pre>
                    </div>
                </div>
            </div>`;
        };

        S('diff-html-target').innerHTML = `
            <div class="d-flex flex-row flex-grow-1 overflow-hidden w-100 h-100">
                ${buildRawPane(leftName, c1, true)}
                ${buildRawPane(rightName, c2, false)}
            </div>
        `;
        hljs.highlightElement(S('diff-html-target').querySelectorAll('code')[0]);
        hljs.highlightElement(S('diff-html-target').querySelectorAll('code')[1]);
    } else {
        const ds = Diff.createTwoFilesPatch(leftName, rightName, c1||"", c2||"", "", "", { context: 99999 });
        S('diff-html-target').innerHTML = '';
        const ui = new Diff2HtmlUI(S('diff-html-target'), ds, { drawFileList: false, matching: 'words', outputFormat: 'side-by-side', colorScheme: 'dark' }, hljs);
        ui.draw(); ui.highlightCode();
    }

    setTimeout(() => {
        const sides = document.querySelectorAll('.d2h-file-side-diff, .raw-diff-pane');
        if (sides.length === 2) {
            let isSyncingLeft = false, isSyncingRight = false;
            sides[0].addEventListener('scroll', () => {
                if (!isSyncingLeft) { isSyncingRight = true; sides[1].scrollTop = sides[0].scrollTop; }
                isSyncingLeft = false;
            });
            sides[1].addEventListener('scroll', () => {
                if (!isSyncingRight) { isSyncingLeft = true; sides[0].scrollTop = sides[1].scrollTop; }
                isSyncingRight = false;
            });
        }
    }, 50);
}

function copySource(id) { 
    if(state.diffViewInfo) {
        let isTpl = state.compareMode === 'template';
        let mode = S('btn-mode-custom').classList.contains('btn-custom') ? 'custom' : 'core';
        let code = id === 1 ? state.diffViewInfo.origCode : ((mode === 'custom' && !isTpl) ? state.diffViewInfo.modCode : (isTpl ? state.diffViewInfo.modCode : state.diffViewInfo.sourceCode));
        navigator.clipboard.writeText(code);
        const btn = S('copy-btn-'+id); const origHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Kopiert'; btn.classList.add('text-success', 'border-success');
        setTimeout(() => { btn.innerHTML = origHtml; btn.classList.remove('text-success', 'border-success'); }, 2000);
    }
}
S('resizer').onmousedown = () => { document.onmousemove = e => { let pct = ((e.clientX - S('sidebar').offsetWidth) / S('content-view').offsetWidth) * 100; S('pane1').style.flex = `0 0 ${Math.max(10, Math.min(90, pct))}%`; }; document.onmouseup = () => document.onmousemove = null; };
</script>
</body>
