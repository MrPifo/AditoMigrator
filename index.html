<!DOCTYPE html>

<style>
body{height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;transition:box-shadow .3s}
#sidebar{width:500px;min-width:300px;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #30363d;background:#161b22}
#tree-container{flex:1;overflow-y:auto;padding-bottom:20px}
.tree-row{display:flex;align-items:center;padding:5px 8px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);gap:6px;transition:background .1s}
.tree-row:hover{background:rgba(255,255,255,.05)}
.tree-row.active{background:rgba(56,139,253,.15);box-shadow:inset 3px 0 0 #58a6ff;font-weight:600;color:#fff!important}
.tree-row.active .node-text{color:#fff!important}
.tree-row>span.node-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;transition:color .1s}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-sizing:border-box}
.icon-col{width:16px;text-align:center;transition:opacity .1s}
.group-header{font-weight:700;background:rgba(0,0,0,.3)!important;border-top:1px solid rgba(255,255,255,.05);text-transform:uppercase;font-size:11px;color:#c9d1d9}
.collapsed+.tree-sub{display:none}
.toggle-icon{width:16px;text-align:center;font-size:12px;transition:transform .2s;color:#6e7681;cursor:pointer}
.toggle-icon:hover{color:#c9d1d9}
.collapsed>.toggle-icon{transform:rotate(-90deg)}
.no-children>.toggle-icon{visibility:hidden}
#content-view{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;background:#0d1117}
.diff-wrapper{display:flex;flex:1;overflow:hidden;position:relative}
.diff-pane{flex:1 1 50%;overflow-y:auto;padding:15px;min-width:0}

#resizer:hover{background:#58a6ff}
.subtle-diff-border{border-left:3px solid var(--bs-warning)!important}
.subtle-diff-border-custom{border-left:3px solid #d2a8ff!important}
.text-custom{color:#d2a8ff!important}
.badge-custom{background-color:#8e44ad;color:#fff;border:1px solid #9b59b6}
.btn-custom{background-color:#8e44ad;color:#fff;border-color:#9b59b6}
.btn-custom:hover{background-color:#9b59b6;color:#fff}
.btn-outline-custom{color:#d2a8ff;border-color:#9b59b6}

.prop-row-interactive:hover{background:rgba(88,166,255,.1);cursor:pointer}
.view-tpl-header{cursor:pointer;transition:background .1s}
.view-tpl-header:hover{background:#21262d!important}
.tpl-chevron{transition:transform .2s;font-size:11px}
.tpl-chevron.collapsed{transform:rotate(-90deg)}
.prop-box{background:#161b22;border:1px solid #30363d;border-radius:6px;overflow:hidden;margin-bottom:15px}
.prop-box-header{background:rgba(0,0,0,.2);border-bottom:1px solid #30363d;padding:6px 12px;font-size:11px;font-weight:700;text-transform:uppercase;color:#c9d1d9}
::-webkit-scrollbar{width:12px;height:12px}
::-webkit-scrollbar-track{background:#0d1117;border-left:1px solid #30363d;border-top:1px solid #30363d}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:6px;border:2px solid #0d1117}
::-webkit-scrollbar-thumb:hover{background:#58a6ff}
::-webkit-scrollbar-corner{background:#0d1117}
#diff-view-container,#diff-html-target{display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden}
#diff-view-container.d-flex{display:flex!important}
.d2h-wrapper{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;margin:0}
.d2h-file-wrapper{flex:1!important;display:flex!important;flex-direction:column;min-height:0;overflow:hidden;margin:0!important;border:none!important;border-radius:0!important}
.d2h-files-diff{flex:1;display:flex;min-height:0;overflow:hidden}
.d2h-file-side-diff{flex:1 1 50%;overflow:auto!important;min-height:0;position:relative}
.d2h-code-wrapper{overflow:visible!important;width:max-content!important;min-width:100%;height:auto!important}

<header class="main-header d-flex align-items-center gap-2 p-2 border-bottom shadow-sm z-3" style="background:#161b22; border-color:#30363d!important; transition:background .3s, box-shadow .3s;">

    <button id="btn-f1" class="btn btn-sm btn-outline-secondary text-light text-truncate" style="max-width:250px;" onclick="S('f1').click()"><i class="fa-regular fa-folder"></i> 1. Original</button>
    <button id="btn-f2" class="btn btn-sm btn-outline-secondary text-light text-truncate" style="max-width:250px;" onclick="S('f2').click()"><i class="fa-regular fa-folder"></i> 2. Modular</button>
    <button id="btn-f3" class="btn btn-sm btn-outline-secondary text-light ms-1 text-truncate" style="max-width:250px;" onclick="S('f3').click()"><i class="fa-regular fa-folder"></i> 3. Template</button>

        <button class="btn btn-sm btn-outline-info ms-1 d-none" onclick="reloadEntity()" id="btn-reload" title="Kompletten Reload erzwingen"><i class="fa-solid fa-rotate"></i></button>
        <div class="form-check form-switch ms-4 mb-0 d-none d-flex align-items-center" id="tpl-toggle-container">

</header>

<main class="d-flex flex-grow-1 overflow-hidden">
    <div id="sidebar">
        <div class="p-2 border-bottom d-flex flex-column gap-2" style="background:#161b22; border-color:#30363d!important;">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <button class="btn btn-sm btn-outline-secondary border-0" onclick="toggleAllTree(false)"><i class="fa-solid fa-compress"></i></button>

            </div>
            <div class="form-check form-switch mb-0 mt-2 ms-1 d-flex align-items-center">
                <input class="form-check-input mt-0 me-2" type="checkbox" id="ignoreTitleToggle" onchange="renderTreeStateful()" style="width:3em; height:1.5em; cursor:pointer;">
                <label class="form-check-label text-secondary fw-bold" style="font-size:14px; cursor:pointer; padding-top:2px;" for="ignoreTitleToggle">Ignore 'title' diffs</label>
            </div>
            <div class="mt-2 position-relative">
                <i class="fa-solid fa-search position-absolute text-secondary" style="top:8px; left:10px; font-size:12px;"></i>
                <input type="text" id="treeSearch" class="form-control form-control-sm bg-dark text-light border-secondary" placeholder="Filter..." oninput="filterTree(this.value)" style="padding-left:30px;">
            </div>
        </div>
        <div id="tree-container"></div>
    </div>
    
    <div id="content-view">
        <div class="p-2 border-bottom d-flex align-items-center justify-content-between" style="background:#161b22; border-color:#30363d!important;">
            <div id="view-title" class="fw-bold" style="color:#c9d1d9;">Bitte ein Element auswählen</div>
            <div class="d-flex align-items-center gap-2">
                <div class="btn-group btn-group-sm shadow-sm me-3 d-none" id="mode-toggle">
                    <button class="btn btn-secondary fw-bold" id="btn-mode-core" onclick="setMode('core')">Modul Core</button>
                    <button class="btn btn-outline-secondary" id="btn-mode-custom" onclick="setMode('custom')"><i class="fa-solid fa-wrench"></i> Custom</button>
                </div>
                <div id="diff-toolbar" class="d-none align-items-center gap-2 border-start border-secondary ps-3 ms-1">
                    <div class="form-check form-switch me-3 mb-0 text-light d-flex align-items-center">
                        <input class="form-check-input mt-0 me-2" type="checkbox" id="rawDiffToggle" onchange="setDiffMode(state.currentMode)" style="width:3em; height:1.5em; cursor:pointer;">
                        <label class="form-check-label fw-bold" for="rawDiffToggle" style="font-size:14px; cursor:pointer; padding-top:2px;">Raw Mode</label>
                    </div>
                    <button class="btn btn-sm btn-outline-warning me-2" onclick="toggleDebugBanner()"><i class="fa-solid fa-bug"></i> Debug</button>
                    <button class="btn btn-sm btn-outline-info me-2" onclick="reloadCurrentProcess()"><i class="fa-solid fa-rotate"></i></button>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-secondary" id="copy-btn-1" onclick="copySource(1)"><i class="fa-regular fa-copy"></i> Links</button>
                        <button class="btn btn-outline-secondary" id="copy-btn-2" onclick="copySource(2)"><i class="fa-regular fa-copy"></i> Rechts</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="debug-banner" class="d-none bg-dark p-2" style="font-size:11px; border-bottom:1px solid #b8860b; box-shadow:inset 0 -2px 5px rgba(0,0,0,.3);">
            <div class="row m-0 w-100">
                <div class="col-6 d-flex align-items-center border-end border-secondary">
                    <span class="text-secondary fw-bold me-2">BASE:</span><span class="font-monospace text-warning text-truncate flex-grow-1" id="debug-path-orig">...</span><button class="btn btn-sm btn-outline-secondary py-0 ms-2" style="font-size:10px;" onclick="copyPath('orig')"><i class="fa-solid fa-copy"></i></button>
                </div>
                <div class="col-6 d-flex align-items-center">
                    <span class="text-secondary fw-bold me-2">TARGET:</span><span class="font-monospace text-warning text-truncate flex-grow-1" id="debug-path-mod">...</span><button class="btn btn-sm btn-outline-secondary py-0 ms-2" style="font-size:10px;" onclick="copyPath('mod')"><i class="fa-solid fa-copy"></i></button>
                </div>
            </div>
        </div>

        <div class="diff-wrapper" id="props-view"><div class="diff-pane" id="pane1"></div><div id="resizer"></div><div class="diff-pane" id="pane2"></div></div>
        <div id="diff-view-container" class="d-none"><div id="diff-html-target" class="bg-dark"></div></div>
    </div>
</main>

<script>
const fs=typeof require!=='undefined'?require('fs'):null, path=typeof require!=='undefined'?require('path'):null;
const S=i=>document.getElementById(i), esc=u=>u?u.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"):"";
window.projNameOrig=window.projNameMod=window.projNameTpl="";

const getUniq= (a,b)=>[...new Map([...(a||[]),...(b||[])].filter(x=>x&&x.name).map(x=>[x.name.toLowerCase(),x.name])).values()];
const findCI=(a,n)=>n&&a?a.find(x=>x&&x.name&&x.name.toLowerCase()===n.toLowerCase()):undefined;
const getTplCI=(m,n)=>n?m[Object.keys(m).find(k=>k.toLowerCase()===n.toLowerCase())]:undefined;
const getRefsCI=(m,n)=>new Set(n?Object.keys(m).filter(k=>k.toLowerCase()===n.toLowerCase()).flatMap(k=>[...m[k]]):[]);

const ADITO_PROCESS_NAMES_ARR=["titleProcess","linkedContextProcess","tooltipProcess","placeholderProcess","valueProcess","displayProcess","displayValueProcess","onValidation","onValueChange","dropDownProcess","colorProcess","stateProcess","mandatoryProcess","selectionModeProcess","contentTypeProcess","expression","iconProcess","onInit","afterUIiInit","beforeOperatingState","afterOperatingState","afterSave","initFilterProcess","contentTitleProcess","contentDescriptionProcess","grantCreateProcess","grantUpdateProcess","grantDeleteProcess","imageProcess","iconIdProcess","uniqueProviderKeyProcess","targetConsumerProcess","filterVariablesProcess","onActionProcess","process","filterConditionProcess","fromClauseProcess","conditionProcess","orderClauseProcess","onDBInsert","onDBUpdate","onDBDelete","filterFieldsProcess","filterValuesProcess","recordContainerProcess","contentProcess","groupQueryProcess","patternExtensionProcess","boostPatternProcess","defaultAction","rowCountProcess","onInsert","onUpdate","onDelete","cacheKeyProcess","titlePluralProcess","externalInitFilterProcess"];
const ADITO_PROCESS_NAMES=new Set(ADITO_PROCESS_NAMES_ARR);
const XML_WRAPPERS=new Set(["entityFields","recordContainers","recordFieldMappings","implementations","children","filterExtensions"]);
const IGNORE_AS_PROPS=new Set([...XML_WRAPPERS,"modelValueWrapper","stringValueWrapper"]);

const PROP_DICTIONARY={entity:{groups:{"General":["title","titlePlural","descriptionField","documentation","comment","metadata","useFavorites","recordRecipeSupported"],"Source":["recordContainer"],"Processes":["onInit","afterUIiInit","beforeOperatingState","afterOperatingState","onValidation","afterSave","initFilterProcess","contentTitleProcess","contentDescriptionProcess"],"Processes grants":["usePermissions","grantCreate","grantCreateProcess","grantUpdate","grantUpdateProcess","grantDelete","grantDeleteProcess"],"Color":["color","colorProcess"],"Icon":["icon","iconProcess","image","imageProcess","iconId","iconIdProcess"]},defaults:{useFavorites:"false",recordRecipeSupported:"false",usePermissions:"false",grantCreate:"true",grantUpdate:"true",grantDelete:"true"}},entityField:{groups:{"General":["name","title","titleProcess","descriptionField","documentation"],"Database":["linkedContext","linkedContextProcess","consumer"],"Tool tip":["tooltip","tooltipProcess"],"Placeholder":["placeholder","placeholderProcess"],"Processes":["valueProcess","displayValueProcess","onValidation","onValueChange","onValueChangeTypes","compareChangesWithRecordField"],"Value List":["dropDownProcess","textInputAllowed"],"Processing grants":["usePermissions"],"Color":["color","colorProcess"],"Activity":["state","stateProcess"],"Required field":["mandatory","mandatoryProcess"],"Single selection":["selectionMode","selectionModeProcess"],"Search":["groupable","preferredGroupOrder"],"Content Type":["contentType","contentTypeProcess"],"Formatting":["maxFieldSize","resolution","outputFormat","inputFormat"]},defaults:{state:"AUTO",mandatory:"false",selectionMode:"SINGLE",contentType:"TEXT",textInputAllowed:"false",usePermissions:"false",groupable:"false"}},entityActionField:{groups:{"General":["name","title","titleProcess","description","documentation"],"Tool tip":["tooltip","tooltipProcess"],"Processing grants":["usePermissions"],"Activity":["state","stateProcess"],"Icon":["iconId","iconIdProcess"],"Action":["onActionProcess","shortcut","isMenuAction","isObjectAction","selectionType","isSaveAction"]},defaults:{state:"EDITABLE",isMenuAction:"true",isObjectAction:"true",selectionType:"UNBOUND",usePermissions:"false"}},entityActionGroup:{groups:{"General":["name","title","titleProcess","description","documentation"],"Tool tip":["tooltip","tooltipProcess"],"Activity":["state","stateProcess"],"Icon":["iconId","iconIdProcess"]}},entityProvider:{groups:{"General":["name","titlePlural","titlePluralProcess","description","documentation","dependencies","lookupIdfield","uniqueProviderKeyProcess"],"Source":["recordcontainer","targetContextField","targetIdField","targetConsumerProcess","useAggregates","sortingField"],"Processing grants":["usePermissions"],"Search":["filterVariablesProcess","initFilterMergeMode"]},defaults:{useAggregates:"false",usePermissions:"true",initFilterMergeMode:"AND"}},entityConsumer:{groups:{"General":["title","description","documentation","entityName","fieldName","refreshParent","isOneToOneRelationship"],"Processes":["onValidation","externalInitFilterProcess"],"Activity":["state","stateProcess"],"Single selection":["selectionMode","selectionModeProcess"]},defaults:{state:"EDITABLE",selectionMode:"SINGLE",refreshParent:"false",isOneToOneRelationship:"false"}},entityParameter:{groups:{"General":["name","description","documentation","title","valueProcess","expose","mandatory"]},defaults:{expose:"false",mandatory:"false"}},dbRecordContainer:{groups:{"General":["title","type","description","documentation"],"Database":["alias","linkInformation","maximumDbRows","isPageable","isReadOnly","isRequireContainerFiltering","hasDependentRecords","fromClauseProcess","conditionProcess","orderClauseProcess","onDBInsert","onDBUpdate","onDBDelete"]},defaults:{type:"dbRecordContainer",isPageable:"true",isReadOnly:"false",isRequireContainerFiltering:"false",hasDependentRecords:"false"}},jDitoRecordContainer:{groups:{"General":["title","type","description","documentation"],"JDito":["jDitoRecordAlias","recordFieldMappings","aggregateFieldMappings","isPageable","supportsFilterExtensionGrouping","isFilterable","isGroupable","isRequireContainerFiltering","isSortable","contentProcess","rowCountProcess","hasDependentRecords","onInsert","onUpdate","onDelete"],"Cache":["cacheType","cacheKeyProcess"]},defaults:{type:"jDitoRecordContainer",isPageable:"false",isFilterable:"false",isGroupable:"false",isRequireContainerFiltering:"false",isSortable:"false",hasDependentRecords:"false"}},dbRecordFieldMapping:{groups:{"General":["entityField","type","recordfield","expression","columnAlias"],"Search":["isFilterable","isLookupFilter","maxFieldSize"]},defaults:{isFilterable:"false",isLookupFilter:"false"}},consumerMapping:{groups:{"General":["type","filterConditionProcess"],"Search":["filtertype","isFilterable","isLookupFilter"]},defaults:{isFilterable:"false",isLookupFilter:"false"}},filterExtension:{groups:{"General":["type","documentation","title","isFilterable","contentType","useConsumer","consumer","filterValuesProcess","filterConditionProcess","groupedRecordField","titleRecordField","isGroupable","groupQueryProcess"],"Search":["filtertype","isLookupfilter"]},defaults:{isFilterable:"true",useConsumer:"false",isGroupable:"false",filtertype:"EXTENDED"}},neonContext:{groups:{"General":["title","devices","description","documentation","comment","icon","iconProcess"],"Entity":["entity"],"Views":["viewmodeProvider","mainView","filterView","editView","previewView","previewMultipleView","lookupView"]},defaults:{devices:"MOBILE|TABLET|DESKTOP"}},neonView:{groups:{"General":["title","type","description","documentation","icon","iconProcess","quickEntry","filterable","size","isOverlay"],"Others":["layout"]},defaults:{filterable:"false",size:"NORMAL",isOverlay:"false"}},entityServiceDefinition:{groups:{"General":["name","documentation"]}},serviceImplementation:{groups:{"General":["name","process"]}}};
const UI_CONFIG={neonContext:{i:'fa-sitemap',c:'#f78166',l:'Context'},entity:{i:'fa-database',c:'#fff',l:'Entity'},entityField:{i:'fa-table-columns',c:'#58a6ff',l:'Fields'},entityConsumer:{i:'fa-link',c:'#3fb950',l:'Consumers'},entityProvider:{i:'fa-sign-out-alt',c:'#ff7b72',l:'Providers'},entityParameter:{i:'fa-sliders',c:'#d2a8ff',l:'Parameters'},entityActionField:{i:'fa-bolt',c:'#d29922',l:'Actions'},entityActionGroup:{i:'fa-layer-group',c:'#d29922',l:'Action Groups'},entityServiceDefinition:{i:'fa-cogs',c:'#8957e5',l:'Services'},recordContainer:{i:'fa-server',c:'#e3b341',l:'Record Containers'},recordFieldMapping:{i:'fa-database',c:'#a5d6ff',l:'Mappings'},filterExtension:{i:'fa-filter',c:'#f0883e',l:'Filter Extensions'},ExtensionPoint:{i:'fa-puzzle-piece',c:'#ff79c6',l:'Extension Points'},neonView:{i:'fa-window-maximize',c:'#58a6ff',l:'Views'},serviceImplementation:{i:'fa-cog',c:'#8957e5',l:'Impls'}};
const DESIGNER_ORDER=['recordContainer','entityField','entityParameter','entityProvider','entityConsumer','entityActionField','entityActionGroup','entityServiceDefinition','filterExtension'];

window._nodeRegistry={};
function registerNodePair(o,m){let id=(m?.id||o?.id); window._nodeRegistry[id]={o,m}; return id;}
window.triggerDiffFromProp=(rId,p)=>{let d=window._nodeRegistry[rId]; loadDiff(p,d.o?.procs?.[p],d.m?.procs?.[p],d.m,d.o);};

class AditoProject {
    constructor(p,n){this.rootPath=p; this.name=n; this.files=new Map(); this.entities=new Set(); this.contextMap=new Map(); this.viewRefs={}; this.viewRoles={}; this.contextViews=new Map(); this.customViewsMod=new Set();}
    async index(){
        if(!fs)return; this.files.clear(); this.entities.clear(); this.contextMap.clear(); this.viewRefs={}; this.viewRoles={}; this.contextViews.clear(); this.customViewsMod.clear(); this._walk(this.rootPath);
        for(const [k,o] of this.files){
            if(k.endsWith('_entity.aod')&&k.includes('entity/')) this.entities.add(path.basename(o.fullPath,'.aod'));
            if(k.endsWith('.aod')&&k.includes('neoncontext/')){
                const t=await this.readText(o.fullPath); if(!t)continue;
                const m=t.match(/<entity>([^<]+)<\/entity>/); if(!m)continue;
                const e=m[1].toLowerCase(), c=path.basename(o.fullPath,'.aod'); this.contextMap.set(e,c);
                if(!this.contextViews.has(e))this.contextViews.set(e,new Set()); const vS=this.contextViews.get(e);
                ['mainView','filterView','editView','previewView','previewMultipleView','lookupView'].forEach(tag=>{
                    let r=new RegExp(`<${tag}>([^<]+)<\\/${tag}>`,'g'), mm; while((mm=r.exec(t))!==null){ vS.add(mm[1]); this.viewRoles[mm[1]]=tag; (this.viewRefs[mm[1]]=this.viewRefs[mm[1]]||new Set()).add(`Context: ${c}`); }
                });
                let refR=/<neonViewReference>[\s\S]*?<view>([^<]+)<\/view>[\s\S]*?<\/neonViewReference>/g, rm;
                while((rm=refR.exec(t))!==null) { vS.add(rm[1]); (this.viewRefs[rm[1]]=this.viewRefs[rm[1]]||new Set()).add(`Context: ${c}`); }
            }
        }
        for(const [k,o] of this.files){
            if(k.includes('modification/')&&k.endsWith('.aod')){
                const t=await this.readText(o.fullPath);
                if(t&&t.includes('<modelType>neonContext</modelType>')){
                    const m=t.match(/<modelName>([^<]+)<\/modelName>/); if(!m)continue;

    if(normS(c1)===normS(c2)&&c1!==""){S('diff-html-target').innerHTML=`<div class="alert alert-success m-3 flex-shrink-0 bg-dark border-success text-success"><i class="fa-solid fa-check-circle"></i> Code ist identisch.</div><div class="p-3 bg-dark flex-grow-1 overflow-auto" style="min-height:0;"><pre class="m-0"><code class="language-javascript bg-transparent">${esc(c1)}</code></pre></div>`; hljs.highlightElement(S('diff-html-target').querySelector('code'));return;}
    
    if(S('rawDiffToggle')?.checked){
        const bRP=(t,c,iL)=>`<div class="d-flex flex-column ${iL?'border-end border-secondary':''}" style="flex:1 1 50%; min-width:0; min-height:0;"><div class="bg-dark p-2 text-secondary fw-bold border-bottom flex-shrink-0" style="font-size:11px;">${t}</div><div class="bg-dark flex-grow-1 overflow-auto raw-diff-pane" style="min-height:0;"><div class="d-flex"><div class="text-secondary text-end border-end user-select-none opacity-50" style="padding:1rem .5rem; min-width:45px; font-size:14px; font-family:var(--bs-font-monospace); line-height:1.5; background:#0d1117; position:sticky; left:0; z-index:5;">${Array((c||"").split('\n').length).fill().map((_,i)=>i+1).join('\n')}</div><div style="padding:1rem; width:max-content; min-width:calc(100% - 45px);"><pre class="m-0" style="font-size:14px; line-height:1.5;"><code class="language-javascript bg-transparent p-0">${esc(c)}</code></pre></div></div></div></div>`;
        S('diff-html-target').innerHTML=`<div class="d-flex flex-row flex-grow-1 w-100" style="min-height:0; overflow:hidden;">${bRP(lN,c1,true)}${bRP(rN,c2,false)}</div>`;
        S('diff-html-target').querySelectorAll('code').forEach(hljs.highlightElement);
    } else {
        S('diff-html-target').innerHTML=''; new Diff2HtmlUI(S('diff-html-target'), Diff.createTwoFilesPatch(lN,rN,c1||"",c2||"","","",{context:99999}), {drawFileList:false,matching:'words',outputFormat:'side-by-side',colorScheme:'dark'}, hljs).draw();
    }
    setTimeout(()=>{
        const s=document.querySelectorAll('.d2h-file-side-diff, .raw-diff-pane');
        if(s.length===2){ let sL=false, sR=false;
            s[0].addEventListener('scroll',()=>{if(!sL){sR=true;s[1].scrollTop=s[0].scrollTop;s[1].scrollLeft=s[0].scrollLeft;}sL=false;});
            s[1].addEventListener('scroll',()=>{if(!sR){sL=true;s[0].scrollTop=s[1].scrollTop;s[0].scrollLeft=s[1].scrollLeft;}sR=false;});
        }
    },50);
}

function copySource(id){ if(state.diffViewInfo){ let isT=state.compareMode==='template', m=S('btn-mode-custom').classList.contains('btn-custom')?'custom':'core', c=id===1?state.diffViewInfo.origCode:((m==='custom'&&!isT)?state.diffViewInfo.modCode:(isT?state.diffViewInfo.modCode:state.diffViewInfo.sourceCode)); navigator.clipboard.writeText(c); const b=S('copy-btn-'+id), oH=b.innerHTML; b.innerHTML='<i class="fa-solid fa-check"></i> Kopiert'; b.classList.add('text-success','border-success'); setTimeout(()=>{b.innerHTML=oH;b.classList.remove('text-success','border-success');},2000); } }
S('resizer').onmousedown=()=>{document.onmousemove=e=>{S('pane1').style.flex=`0 0 ${Math.max(10,Math.min(90,((e.clientX-S('sidebar').offsetWidth)/S('content-view').offsetWidth)*100))}%`;}; document.onmouseup=()=>document.onmousemove=null;};
</script>
</body>
