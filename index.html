<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<title>ADITO Migrator v14.0 - Inspector Edition</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.2.0/diff.min.js"></script>
<script src="https://unpkg.com/prettier@3.2.5/standalone.js"></script>
<script src="https://unpkg.com/prettier@3.2.5/plugins/estree.js"></script>
<script src="https://unpkg.com/prettier@3.2.5/plugins/babel.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css" />
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html-ui.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-size: 13px; background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    #sidebar { width: 500px; min-width: 300px; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid #30363d; background: #161b22; }
    #tree-container { flex: 1; overflow-y: auto; padding-bottom: 20px; }
    
    .tree-row { display: flex; align-items: center; padding: 5px 8px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); gap: 6px; transition: background 0.1s; }
    .tree-row:hover { background: rgba(255,255,255,0.05); }
    .tree-row.active { background: rgba(56, 139, 253, 0.15); box-shadow: inset 3px 0 0 #58a6ff; font-weight: 600; color: #ffffff !important; }
    .tree-row.active .node-text { color: #ffffff !important; }
    .tree-row > span.node-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; transition: color 0.1s; }
    
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-sizing: border-box; }
    .icon-col { width: 16px; text-align: center; transition: opacity 0.1s; }
    
    .group-header { font-weight: bold; background: rgba(0,0,0,0.3) !important; border-top: 1px solid rgba(255,255,255,0.05); text-transform: uppercase; font-size: 11px; color: #c9d1d9; }
    .collapsed + .tree-sub { display: none; }
    .toggle-icon { width: 16px; text-align: center; font-size: 12px; transition: transform 0.2s; color: #6e7681; cursor: pointer; }
    .toggle-icon:hover { color: #c9d1d9; }
    .collapsed > .toggle-icon { transform: rotate(-90deg); }
    .no-children > .toggle-icon { visibility: hidden; }
    
    #content-view { display: flex; flex-direction: column; flex: 1; overflow: hidden; min-height: 0; background: #0d1117; }
    .diff-wrapper { display: flex; flex: 1; overflow: hidden; position: relative; }
    .diff-pane { flex: 1 1 50%; overflow-y: auto; padding: 15px; min-width: 0; }
    #resizer { width: 4px; cursor: col-resize; background: #30363d; z-index: 5; transition: background 0.2s; }
    #resizer:hover { background: #58a6ff; }
    
    .subtle-diff-border { border-left: 3px solid var(--bs-warning) !important; }
    .subtle-diff-border-custom { border-left: 3px solid #d2a8ff !important; }
    .text-custom { color: #d2a8ff !important; }
    .badge-custom { background-color: #8e44ad; color: white; border: 1px solid #9b59b6; }
    .btn-custom { background-color: #8e44ad; color: white; border-color: #9b59b6; }
    .btn-custom:hover { background-color: #9b59b6; color: white; }
    .btn-outline-custom { color: #d2a8ff; border-color: #9b59b6; }
    .btn-outline-custom:hover { background-color: #8e44ad; color: white; }
    
    .prop-row { transition: background 0.1s; }
    .prop-row:hover { background: rgba(255,255,255,0.03); }
    .is-process { text-decoration: underline; text-decoration-style: dotted; color: #58a6ff; cursor: pointer; }
    .is-process:hover { color: #79c0ff; }
    
    .d2h-file-wrapper { border: none; margin-bottom: 0; border-radius: 0; }
    .d2h-file-header { display: none; }
    
    .view-tpl-header { cursor: pointer; transition: background 0.1s; }
    .view-tpl-header:hover { background: #21262d !important; }
    .tpl-chevron { transition: transform 0.2s; font-size: 11px; }
    .tpl-chevron.collapsed { transform: rotate(-90deg); }
    
    .prop-box { background: #161b22; border: 1px solid #30363d; border-radius: 6px; overflow: hidden; margin-bottom: 15px; }
    .prop-box-header { background: rgba(0,0,0,0.2); border-bottom: 1px solid #30363d; padding: 6px 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #c9d1d9; }
</style>
</head>
<body>

<header class="d-flex align-items-center gap-2 p-2 border-bottom shadow-sm z-3" style="background: #161b22; border-color: #30363d !important;">
    <div class="fw-bold fs-6 me-3 text-white"><i class="fa-solid fa-bolt text-warning"></i> ADITO Migrator v14.0</div>
    <button id="btn-f1" class="btn btn-sm btn-outline-secondary text-light" onclick="document.getElementById('f1').click()"><i class="fa-regular fa-folder"></i> 1. Original</button>
    <button id="btn-f2" class="btn btn-sm btn-outline-secondary text-light" onclick="document.getElementById('f2').click()"><i class="fa-regular fa-folder"></i> 2. Modular</button>
   
    <div class="d-flex align-items-center ms-3">
        <select id="entitySelect" class="form-select form-select-sm w-auto bg-dark text-light" disabled>
            <option value="">Warte auf Projekte...</option>
        </select>
        <button class="btn btn-sm btn-primary ms-2" onclick="startAnalysis()" id="btn-analyze" disabled title="Entity analysieren"><i class="fa-solid fa-play"></i></button>
        <button class="btn btn-sm btn-outline-info ms-1 d-none" onclick="reloadEntity()" id="btn-reload" title="Entity neu laden"><i class="fa-solid fa-rotate"></i></button>
    </div>

    <div class="ms-auto d-flex gap-3 text-secondary small align-items-center">
        <span title="Eigene Projekt-Anpassung"><span class="badge badge-custom shadow-sm"><i class="fa-solid fa-wrench"></i> CUSTOM</span></span>
        <span title="Extension Point Injection"><span class="badge shadow-sm text-dark" style="background-color: #ff79c6;">EXT</span></span>
        <span class="border-start border-secondary h-50 mx-1"></span>
        <span><div class="status-dot d-inline-block" style="background:#8b949e;"></div> Modular-Only</span>
        <span><div class="status-dot d-inline-block" style="border:1px solid #30363d; background:transparent;"></div> Gleich</span>
        <span><div class="status-dot bg-danger d-inline-block"></div> Fehlt</span>
        <span><div class="status-dot bg-warning d-inline-block"></div> Geändert</span>
        <span><div class="status-dot d-inline-block" style="border: 2px solid #d29922; background:transparent;"></div> Prozess-Diff</span>
    </div>

    <input type="file" id="f1" nwdirectory hidden>
    <input type="file" id="f2" nwdirectory hidden>
</header>

<main class="d-flex flex-grow-1 overflow-hidden">
    <div id="sidebar">
        <div class="p-2 border-bottom d-flex flex-column gap-2" style="background: #161b22; border-color: #30363d !important;">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <button class="btn btn-sm btn-outline-secondary border-0" onclick="toggleAllTree(false)" title="Einklappen"><i class="fa-solid fa-compress"></i></button>
                    <button class="btn btn-sm btn-outline-secondary border-0" onclick="toggleAllTree(true)" title="Ausklappen"><i class="fa-solid fa-expand"></i></button>
                </div>
                <span class="small text-secondary" id="file-status">Keine Projekte.</span>
            </div>
            <div class="form-check form-switch mb-0 align-self-start ms-1">
                <input class="form-check-input" type="checkbox" id="ignoreTitleToggle" onchange="renderTree()" checked>
                <label class="form-check-label text-secondary" style="font-size: 11px;" for="ignoreTitleToggle">Ignore 'title' diffs</label>
            </div>
        </div>
        <div id="tree-container"></div>
    </div>
    
    <div id="content-view">
        <div class="p-2 border-bottom d-flex align-items-center justify-content-between" style="background: #161b22; border-color: #30363d !important;">
            <div id="view-title" class="fw-bold" style="color: #c9d1d9;">Bitte ein Element auswählen</div>
            
            <div id="diff-toolbar" class="d-none align-items-center gap-2">
                <button class="btn btn-sm btn-outline-warning me-2" onclick="toggleDebugBanner()" title="Source Pfade ein/ausblenden"><i class="fa-solid fa-bug"></i> Debug</button>
                <button class="btn btn-sm btn-outline-info me-2" onclick="reloadCurrentProcess()" title="Prozess neu laden"><i class="fa-solid fa-rotate"></i></button>
                <div class="btn-group btn-group-sm shadow-sm me-3" id="mode-toggle">
                    <button class="btn btn-secondary" id="btn-mode-core" onclick="setDiffMode('core')">Modul Core</button>
                    <button class="btn btn-outline-custom" id="btn-mode-custom" onclick="setDiffMode('custom')"><i class="fa-solid fa-wrench"></i> Custom</button>
                </div>
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-secondary" id="copy-btn-1" onclick="copySource(1)"><i class="fa-regular fa-copy"></i> Orig.</button>
                    <button class="btn btn-outline-secondary" id="copy-btn-2" onclick="copySource(2)"><i class="fa-regular fa-copy"></i> Modul</button>
                </div>
            </div>
        </div>
        
        <div id="debug-banner" class="d-none bg-dark p-2" style="font-size: 11px; border-bottom: 1px solid #b8860b; box-shadow: inset 0 -2px 5px rgba(0,0,0,0.3);">
            <div class="row m-0 w-100">
                <div class="col-6 d-flex align-items-center border-end border-secondary">
                    <span class="text-secondary fw-bold me-2">ORIG:</span>
                    <span class="font-monospace text-warning text-truncate flex-grow-1" id="debug-path-orig">...</span>
                    <button class="btn btn-sm btn-outline-secondary py-0 ms-2" style="font-size: 10px;" onclick="copyPath('orig')"><i class="fa-solid fa-copy"></i></button>
                </div>
                <div class="col-6 d-flex align-items-center">
                    <span class="text-secondary fw-bold me-2">MODUL:</span>
                    <span class="font-monospace text-warning text-truncate flex-grow-1" id="debug-path-mod">...</span>
                    <button class="btn btn-sm btn-outline-secondary py-0 ms-2" style="font-size: 10px;" onclick="copyPath('mod')"><i class="fa-solid fa-copy"></i></button>
                </div>
            </div>
        </div>

        <div class="diff-wrapper" id="props-view">
            <div class="diff-pane" id="pane1"></div>
            <div id="resizer"></div>
            <div class="diff-pane" id="pane2"></div>
        </div>

        <div id="diff-view-container" class="d-none flex-column flex-grow-1 overflow-hidden">
            <div id="diff-html-target" class="flex-grow-1 overflow-auto bg-dark"></div>
        </div>
    </div>
</main>

<script>
// --- NW.JS APIS ---
const fs = typeof require !== 'undefined' ? require('fs') : null;
const path = typeof require !== 'undefined' ? require('path') : null;
const S = (id) => document.getElementById(id);
const escapeHtml = (unsafe) => unsafe ? unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : "";

// --- METADATA DICTIONARY ---
const ADITO_PROCESS_NAMES = new Set(["titleProcess", "linkedContextProcess", "tooltipProcess", "placeholderProcess", "valueProcess", "displayProcess", "displayValueProcess", "onValidation", "onValueChange", "dropDownProcess", "colorProcess", "stateProcess", "mandatoryProcess", "selectionModeProcess", "contentTypeProcess", "expression", "iconProcess", "onInit", "afterUIiInit", "beforeOperatingState", "afterOperatingState", "afterSave", "initFilterProcess", "contentTitleProcess", "contentDescriptionProcess", "grantCreateProcess", "grantUpdateProcess", "grantDeleteProcess", "imageProcess", "iconIdProcess", "uniqueProviderKeyProcess", "targetConsumerProcess", "filterVariablesProcess", "onActionProcess", "process", "filterConditionProcess", "fromClauseProcess", "conditionProcess", "orderClauseProcess", "onDBInsert", "onDBUpdate", "onDBDelete", "filterFieldsProcess", "filterValuesProcess", "recordContainerProcess", "contentProcess", "groupQueryProcess", "patternExtensionProcess", "boostPatternProcess", "defaultAction", "rowCountProcess", "onInsert", "onUpdate", "onDelete", "cacheKeyProcess", "titlePluralProcess", "externalInitFilterProcess"]);
const XML_WRAPPERS = new Set(["entityFields", "recordContainers", "recordFieldMappings", "implementations", "children", "filterExtensions"]);
const IGNORE_AS_PROPS = new Set([...XML_WRAPPERS, "modelValueWrapper", "stringValueWrapper"]);

const PROP_DICTIONARY = {
    entity: { groups: { "General": ["title", "titlePlural", "descriptionField", "documentation", "comment", "metadata", "useFavorites", "recordRecipeSupported"], "Source": ["recordContainer"], "Processes": ["onInit", "afterUIiInit", "beforeOperatingState", "afterOperatingState", "onValidation", "afterSave", "initFilterProcess", "contentTitleProcess", "contentDescriptionProcess"], "Processes grants": ["usePermissions", "grantCreate", "grantCreateProcess", "grantUpdate", "grantUpdateProcess", "grantDelete", "grantDeleteProcess"], "Color": ["color", "colorProcess"], "Icon": ["icon", "iconProcess", "image", "imageProcess", "iconId", "iconIdProcess"] }, defaults: { useFavorites: "false", recordRecipeSupported: "false", usePermissions: "false", grantCreate: "true", grantUpdate: "true", grantDelete: "true" } },
    entityField: { groups: { "General": ["name", "title", "titleProcess", "descriptionField", "documentation"], "Database": ["linkedContext", "linkedContextProcess", "consumer"], "Tool tip": ["tooltip", "tooltipProcess"], "Placeholder": ["placeholder", "placeholderProcess"], "Processes": ["valueProcess", "displayValueProcess", "onValidation", "onValueChange", "onValueChangeTypes", "compareChangesWithRecordField"], "Value List": ["dropDownProcess", "textInputAllowed"], "Processing grants": ["usePermissions"], "Color": ["color", "colorProcess"], "Activity": ["state", "stateProcess"], "Required field": ["mandatory", "mandatoryProcess"], "Single selection": ["selectionMode", "selectionModeProcess"], "Search": ["groupable", "preferredGroupOrder"], "Content Type": ["contentType", "contentTypeProcess"], "Formatting": ["maxFieldSize", "resolution", "outputFormat", "inputFormat"] }, defaults: { state: "AUTO", mandatory: "false", selectionMode: "SINGLE", contentType: "TEXT", textInputAllowed: "false", usePermissions: "false", groupable: "false" } },
    entityActionField: { groups: { "General": ["name", "title", "titleProcess", "description", "documentation"], "Tool tip": ["tooltip", "tooltipProcess"], "Processing grants": ["usePermissions"], "Activity": ["state", "stateProcess"], "Icon": ["iconId", "iconIdProcess"], "Action": ["onActionProcess", "shortcut", "isMenuAction", "isObjectAction", "selectionType", "isSaveAction"] }, defaults: { state: "EDITABLE", isMenuAction: "true", isObjectAction: "true", selectionType: "UNBOUND", usePermissions: "false" } },
    entityActionGroup: { groups: { "General": ["name", "title", "titleProcess", "description", "documentation"], "Tool tip": ["tooltip", "tooltipProcess"], "Activity": ["state", "stateProcess"], "Icon": ["iconId", "iconIdProcess"] }, defaults: {} },
    entityProvider: { groups: { "General": ["name", "titlePlural", "titlePluralProcess", "description", "documentation", "dependencies", "lookupIdfield", "uniqueProviderKeyProcess"], "Source": ["recordcontainer", "targetContextField", "targetIdField", "targetConsumerProcess", "useAggregates", "sortingField"], "Processing grants": ["usePermissions"], "Search": ["filterVariablesProcess", "initFilterMergeMode"] }, defaults: { useAggregates: "false", usePermissions: "true", initFilterMergeMode: "AND" } },
    entityConsumer: { groups: { "General": ["title", "description", "documentation", "entityName", "fieldName", "refreshParent", "isOneToOneRelationship"], "Processes": ["onValidation", "externalInitFilterProcess"], "Activity": ["state", "stateProcess"], "Single selection": ["selectionMode", "selectionModeProcess"] }, defaults: { state: "EDITABLE", selectionMode: "SINGLE", refreshParent: "false", isOneToOneRelationship: "false" } },
    entityParameter: { groups: { "General": ["name", "description", "documentation", "title", "valueProcess", "expose", "mandatory"] }, defaults: { expose: "false", mandatory: "false" } },
    dbRecordContainer: { groups: { "General": ["title", "type", "description", "documentation"], "Database": ["alias", "linkInformation", "maximumDbRows", "isPageable", "isReadOnly", "isRequireContainerFiltering", "hasDependentRecords", "fromClauseProcess", "conditionProcess", "orderClauseProcess", "onDBInsert", "onDBUpdate", "onDBDelete"] }, defaults: { type: "dbRecordContainer", isPageable: "true", isReadOnly: "false", isRequireContainerFiltering: "false", hasDependentRecords: "false" } },
    jDitoRecordContainer: { groups: { "General": ["title", "type", "description", "documentation"], "JDito": ["jDitoRecordAlias", "recordFieldMappings", "aggregateFieldMappings", "isPageable", "supportsFilterExtensionGrouping", "isFilterable", "isGroupable", "isRequireContainerFiltering", "isSortable", "contentProcess", "rowCountProcess", "hasDependentRecords", "onInsert", "onUpdate", "onDelete"], "Cache": ["cacheType", "cacheKeyProcess"] }, defaults: { type: "jDitoRecordContainer", isPageable: "false", isFilterable: "false", isGroupable: "false", isRequireContainerFiltering: "false", isSortable: "false", hasDependentRecords: "false" } },
    dbRecordFieldMapping: { groups: { "General": ["entityField", "type", "recordfield", "expression", "columnAlias"], "Search": ["isFilterable", "isLookupFilter", "maxFieldSize"] }, defaults: { isFilterable: "false", isLookupFilter: "false" } },
    consumerMapping: { groups: { "General": ["type", "filterConditionProcess"], "Search": ["filtertype", "isFilterable", "isLookupFilter"] }, defaults: { isFilterable: "false", isLookupFilter: "false" } },
    filterExtension: { groups: { "General": ["type", "documentation", "title", "isFilterable", "contentType", "useConsumer", "consumer", "filterValuesProcess", "filterConditionProcess", "groupedRecordField", "titleRecordField", "isGroupable", "groupQueryProcess"], "Search": ["filtertype", "isLookupfilter"] }, defaults: { isFilterable: "true", useConsumer: "false", isGroupable: "false", filtertype: "EXTENDED" } },
    neonContext: { groups: { "General": ["title", "devices", "description", "documentation", "comment", "icon", "iconProcess"], "Entity": ["entity"], "Views": ["viewmodeProvider", "mainView", "filterView", "editView", "previewView", "previewMultipleView", "lookupView"] }, defaults: { devices: "MOBILE|TABLET|DESKTOP" } },
    neonView: { groups: { "General": ["title", "type", "description", "documentation", "icon", "iconProcess", "quickEntry", "filterable", "size", "isOverlay"], "Others": ["layout"] }, defaults: { filterable: "false", size: "NORMAL", isOverlay: "false" } }
};

const UI_CONFIG = {
    neonContext: { i: 'fa-sitemap', c: '#f78166', l: 'Context' },
    entity: { i: 'fa-database', c: '#ffffff', l: 'Entity' },
    entityField: { i: 'fa-table-columns', c: '#58a6ff', l: 'Fields' },
    entityConsumer: { i: 'fa-link', c: '#3fb950', l: 'Consumers' },
    entityProvider: { i: 'fa-sign-out-alt', c: '#ff7b72', l: 'Providers' },
    entityParameter: { i: 'fa-sliders', c: '#d2a8ff', l: 'Parameters' },
    entityActionField: { i: 'fa-bolt', c: '#d29922', l: 'Actions' },
    entityActionGroup: { i: 'fa-layer-group', c: '#d29922', l: 'Action Groups' },
    entityServiceDefinition: { i: 'fa-cogs', c: '#8957e5', l: 'Services' },
    recordContainer: { i: 'fa-server', c: '#e3b341', l: 'Record Containers' },
    recordFieldMapping: { i: 'fa-database', c: '#a5d6ff', l: 'Mappings' },
    filterExtension: { i: 'fa-filter', c: '#f0883e', l: 'Filter Extensions' },
    ExtensionPoint: { i: 'fa-puzzle-piece', c: '#ff79c6', l: 'Extension Points' },
    neonView: { i: 'fa-window-maximize', c: '#58a6ff', l: 'Views' },
    serviceImplementation: { i: 'fa-cog', c: '#8957e5', l: 'Impls' }
};

const DESIGNER_ORDER = ['recordContainer', 'entityField', 'entityParameter', 'entityProvider', 'entityConsumer', 'entityActionField', 'entityActionGroup', 'entityServiceDefinition', 'filterExtension'];

// --- PROJECT ENGINE ---
class AditoProject {
    constructor(path, name) { this.rootPath = path; this.name = name; this.files = new Map(); this.entities = new Set(); this.contextMap = new Map(); this.viewRefs = {}; this.viewRoles = {}; this.knownLibraries = new Map(); this.contextViews = new Map(); }
    
    async index() {
        if (!fs) return; this.files.clear(); this._walk(this.rootPath);
        
        for (const [key, obj] of this.files.entries()) {
            if (key.includes('/process/') && key.endsWith('.aod')) {
                const xml = await this.readXml(obj.fullPath);
                if (xml && xml.nodeName === 'process') {
                    let libNode = xml.getElementsByTagName('name')[0];
                    let procNode = xml.getElementsByTagName('process')[0];
                    let libName = libNode ? libNode.textContent.trim() : path.basename(obj.fullPath, '.aod');
                    let exports = new Set();
                    if (procNode) {
                        let procPath = procNode.textContent.trim();
                        let jsFile = null;
                        if (procPath === 'process.js' || procPath === './process.js') {
                            let expectedJs = path.join(path.dirname(obj.fullPath), 'process.js');
                            jsFile = Array.from(this.files.values()).find(f => f.fullPath === expectedJs);
                        } else { jsFile = this.findFile(procPath); }
                        
                        if (jsFile) {
                            let jsContent = await this.readText(jsFile.fullPath);
                            if (jsContent) {
                                let exRegex = /export\s+(?:default\s+)?(?:function|const|let|var|class)\s+([a-zA-Z0-9_$]+)/g;
                                let m; while((m = exRegex.exec(jsContent)) !== null) exports.add(m[1]);
                                let blockRegex = /export\s+{([^}]+)}/g;
                                while((m = blockRegex.exec(jsContent)) !== null) {
                                    m[1].split(',').forEach(item => { let clean = item.split(' as ')[0].trim(); if(clean) exports.add(clean); });
                                }
                            }
                        }
                    }
                    this.knownLibraries.set(libName, exports);
                }
            }
        }

        for (const [key, obj] of this.files.entries()) {
            if (key.endsWith('_entity.aod') && key.includes('entity/')) {
                this.entities.add(path.basename(obj.fullPath, '.aod'));
            }
            if (key.endsWith('.aod') && key.includes('neoncontext/')) {
                const txt = await this.readText(obj.fullPath);
                if(txt) { 
                    const match = txt.match(/<entity>([^<]+)<\/entity>/); 
                    if(match) {
                        const entName = match[1].toLowerCase();
                        const ctxName = path.basename(obj.fullPath, '.aod');
                        this.contextMap.set(entName, ctxName); 
                        
                        if(!this.contextViews.has(entName)) this.contextViews.set(entName, new Set());
                        const vSet = this.contextViews.get(entName);
                        
                        ['mainView', 'filterView', 'editView', 'previewView', 'previewMultipleView', 'lookupView'].forEach(tag => {
                            let r = new RegExp(`<${tag}>([^<]+)<\\/${tag}>`, 'g');
                            let m; while((m = r.exec(txt)) !== null) {
                                vSet.add(m[1]); this.viewRoles[m[1]] = tag;
                                if(!this.viewRefs[m[1]]) this.viewRefs[m[1]] = new Set();
                                this.viewRefs[m[1]].add(`Context: ${ctxName}`);
                            }
                        });
                        
                        let refR = /<neonViewReference>[\s\S]*?<view>([^<]+)<\/view>[\s\S]*?<\/neonViewReference>/g;
                        let m; while((m = refR.exec(txt)) !== null) {
                            vSet.add(m[1]);
                            if(!this.viewRefs[m[1]]) this.viewRefs[m[1]] = new Set();
                            this.viewRefs[m[1]].add(`Context: ${ctxName}`);
                        }
                    }
                }
            }
        }
    }
    
    _walk(dir) {
        try { fs.readdirSync(dir).forEach(file => {
            const fp = path.join(dir, file);
            if (fs.statSync(fp).isDirectory()) { 
                if (!['dist', 'node_modules_ignored', '.git'].includes(file)) this._walk(fp); 
            } else { 
                let relP = fp.substring(this.rootPath.length + 1).replace(/\\/g, '/');
                this.files.set(relP.toLowerCase(), { path: relP, fullPath: fp }); 
                if(relP.includes('/process/') && file.endsWith('.js')) {
                    let bName = file.replace('.js', '');
                    if(!this.knownLibraries.has(bName)) this.knownLibraries.set(bName, new Set());
                }
            }
        }); } catch (e) {}
    }
    async readText(fp) { return fs.existsSync(fp) ? fs.readFileSync(fp, 'utf-8') : null; }
    async readXml(fp) { const t = await this.readText(fp); return t ? new DOMParser().parseFromString(t, "text/xml").documentElement : null; }
    findFile(p) { const s = p.toLowerCase().replace('%aditoprj%/', ''); for(const [k, v] of this.files.entries()) if(k.endsWith(s)) return v; return null; }
}

// --- PARSER ---
class TreeNode {
    constructor(name, type, file, id) { 
        this.id = id; this.name = name; this.type = type; this.file = file; 
        this.props = {}; this.procs = {}; this.procContents = {}; this.coreProcContents = {}; this.procErrors = {}; this.children = []; 
        this.isCustom = false; this.isDeleted = false; this.isExt = false; this.rawXml = null; this.refContexts = [];
    }
}

function checkImports(content, knownLibs) {
    let errs = []; if (!content) return errs;
    let matches = [...content.matchAll(/import\s+(?:{\s*([^}]+)\s*}|([a-zA-Z0-9_$]+|\*\s+as\s+[a-zA-Z0-9_$]+))\s+from\s+["']([^"']+)["']/g)];
    for(let m of matches) {
        let lib = m[3]; 
        if (lib.startsWith('@aditosoftware/') || lib.startsWith('.')) continue;
        
        let libKey = knownLibs.has(lib) ? lib : lib.replace('.js', '');
        if (!knownLibs.has(libKey)) {
            errs.push(`Library '${lib}' fehlt`);
            continue;
        }
        
        let exportsSet = knownLibs.get(libKey);
        if (m[1] && exportsSet.size > 0) { 
            let imports = m[1].split(',').map(s => s.split(' as ')[0].trim()).filter(s => s);
            imports.forEach(imp => { if (!exportsSet.has(imp)) errs.push(`'${imp}' fehlt in '${lib}'`); });
        }
    }
    return [];
}

function extractTemplates(xml) {
    let tpls = {}; if(!xml) return tpls;
    let children = xml.getElementsByTagName('children')[0]; if(!children) return tpls;
    Array.from(children.childNodes).filter(n=>n.nodeType===1).forEach(c => {
        let type = c.nodeName; 
        let nameNode = c.getElementsByTagName('name')[0]; 
        let name = nameNode ? nameNode.textContent.trim() : type;
        
        if (type === 'neonViewReference') {
            let vNode = c.getElementsByTagName('view')[0];
            if (vNode) name = vNode.textContent.trim();
        }

        let props = {};
        Array.from(c.childNodes).filter(n=>n.nodeType===1 && n.nodeName!=='name').forEach(sub => {
            let val = sub.textContent.trim();
            if(sub.firstElementChild) {
                let parts = Array.from(sub.childNodes).filter(x => x.nodeType === 1).map(x => {
                    let ef = x.getElementsByTagName('entityField')[0] || x.getElementsByTagName('view')[0] || x.getElementsByTagName('element')[0];
                    if (ef) return ef.textContent.trim();
                    let nNode = x.getElementsByTagName('name')[0]; if(nNode && nNode.textContent.length === 36) return ""; return x.textContent.trim();
                }).filter(v => v);
                val = parts.join(' • ');
            } else if(val==="") { if(sub.hasAttribute('v')) val = sub.getAttribute('v'); else if(sub.hasAttribute('value')) val = sub.getAttribute('value'); }
            props[sub.nodeName] = val;
        });
        while(tpls[name]) name += "_dup";
        tpls[name] = { type: type, props: props };
    });
    return tpls;
}

async function buildData(project, entName) {
    if (!project) return { entity: null, context: null, views: [] };
    const entLower = entName.toLowerCase(); const ctxName = project.contextMap.get(entLower);
    let res = { entity: new TreeNode(entName, "entity", null, 'root_ent'), context: null, views: [] };
    
    let allowedViews = project.contextViews.get(entLower) || new Set();

    for (const [key, fileObj] of project.files.entries()) {
        if (!key.endsWith('.aod') || key.includes('modification/')) continue;
        
        if (key.includes(`/${entLower}.aod`) || key.includes(`/${entLower}_entity/`)) {
            const xml = await project.readXml(fileObj.fullPath);
            if (xml && xml.nodeName === 'entity') { res.entity.file = fileObj; await extractNodeDataAsync(xml, res.entity, project); }
            if (xml) await parseWalkerAsync(xml, res.entity, fileObj, false, project);
        } else if (ctxName && key.includes(`neoncontext/${ctxName.toLowerCase()}.aod`)) {
            const xml = await project.readXml(fileObj.fullPath);
            if(xml) { res.context = new TreeNode(ctxName, "neonContext", fileObj, 'root_ctx'); await extractNodeDataAsync(xml, res.context, project); }
        } else if (key.includes('neonview/')) {
            let vName = path.basename(fileObj.fullPath, '.aod');
            if (allowedViews.has(vName)) {
                const xml = await project.readXml(fileObj.fullPath);
                if(xml) { 
                    let vn = new TreeNode(vName, "neonView", fileObj, 'view_'+vName); vn.rawXml = xml; 
                    if(project.viewRefs[vName]) vn.refContexts = Array.from(project.viewRefs[vName]);
                    await extractNodeDataAsync(xml, vn, project); res.views.push(vn); 
                }
            }
        }
    }

    if (project.name === "Modular") {
        for (const [key, fileObj] of project.files.entries()) {
            if (key.includes('modification/') && key.endsWith('.aod')) {
                const xml = await project.readXml(fileObj.fullPath);
                if (xml) {
                    const modTarget = xml.getElementsByTagName('modelName')[0]?.textContent;
                    if(modTarget) {
                        if (modTarget.toLowerCase() === entLower) await applyModAsync(xml, res.entity, fileObj, project);
                        else { let targetView = res.views.find(v => v.name === modTarget); if(targetView) { targetView.isCustom = !fileObj.path.includes('node_modules'); } }
                    }
                }
            }
        }
    }
    return res;
}

function getDeepValue(node) {
    if (!node) return ""; let children = Array.from(node.childNodes).filter(n => n.nodeType === 1 && n.nodeName !== 'name');
    if (children.length === 0) return node.textContent.trim(); return getDeepValue(children[0]);
}

async function extractNodeDataAsync(xml, targetNode, project) {
    for(let c of Array.from(xml.childNodes)) {
        if (c.nodeType === 1 && c.nodeName !== 'name' && !IGNORE_AS_PROPS.has(c.nodeName)) {
            let val = c.textContent.trim();
            if(c.firstElementChild) val = Array.from(c.childNodes).filter(sub => sub.nodeType===1 && sub.nodeName!=='name').map(sub => `${sub.nodeName}: ${sub.textContent.trim()}`).join(' | ');
            else if (val === "") { if (c.hasAttribute('v')) val = c.getAttribute('v'); else if (c.hasAttribute('value')) val = c.getAttribute('value'); }
            
            if (ADITO_PROCESS_NAMES.has(c.nodeName)) {
                targetNode.procs[c.nodeName] = val; 
                let procPath = val; let f = null;
                if (procPath === 'process.js' || procPath === './process.js') f = Array.from(project.files.values()).find(fl => fl.fullPath === path.join(path.dirname(targetNode.file.fullPath), 'process.js'));
                else f = project.findFile(procPath);
                
                if(f) {
                    let content = await project.readText(f.fullPath); targetNode.procContents[c.nodeName] = content;
                    let errs = checkImports(content, project.knownLibraries); if(errs.length > 0) targetNode.procErrors[c.nodeName] = errs;
                }
            } else targetNode.props[c.nodeName] = val;
        }
    }
}

async function parseWalkerAsync(xml, parentTree, fileObj, isCustom, project) {
    for(let c of Array.from(xml.childNodes)) {
        if (c.nodeType !== 1) continue;
        let isExt = c.nodeName.toLowerCase().includes('extensionpoint') || (c.nodeName !== 'entityServiceDefinition' && c.nodeName !== 'entityActionGroup' && Array.from(c.childNodes).some(n => n.nodeName === 'implementations'));
        if (isExt) {
            let baseType = c.nodeName.replace('ExtensionPoint', ''); let impls = Array.from(c.childNodes).find(n => n.nodeName === 'implementations');
            if(impls && impls.firstElementChild) baseType = impls.firstElementChild.nodeName;
            const name = c.getElementsByTagName('name')[0]?.textContent || c.nodeName;
            let ext = new TreeNode(name, baseType, fileObj, parentTree.id + '_' + name); ext.isExt = true; parentTree.children.push(ext);
            if(impls) await parseWalkerAsync(impls, ext, fileObj, isCustom, project); continue;
        }
        if (XML_WRAPPERS.has(c.nodeName)) { await parseWalkerAsync(c, parentTree, fileObj, isCustom, project); continue; }
        const nameNode = Array.from(c.childNodes).find(n => n.nodeName === 'name');
        if (nameNode && !IGNORE_AS_PROPS.has(c.nodeName)) {
            let type = c.nodeName; if(type.endsWith('RecordContainer')) type = 'recordContainer'; if(type.endsWith('RecordFieldMapping') || type === 'consumerMapping') type = 'recordFieldMapping';
            let node = new TreeNode(nameNode.textContent.trim(), type, fileObj, parentTree.id + '_' + nameNode.textContent.trim());
            node.isCustom = isCustom; if(parentTree.type === 'ExtensionPoint') node.isExt = true;
            await extractNodeDataAsync(c, node, project); parentTree.children.push(node); await parseWalkerAsync(c, node, fileObj, isCustom, project);
        }
    }
}

async function applyModAsync(xml, rootTree, fileObj, project) {
    const cType = xml.getElementsByTagName('changeType')[0]?.textContent; const pathTxt = xml.getElementsByTagName('path')[0]?.textContent || "";
    const pathParts = pathTxt.split('/').filter(p => !XML_WRAPPERS.has(p) && p !== rootTree.name);
    const isCustom = !fileObj.path.includes('node_modules');
    const findNode = (pathArr) => { let curr = rootTree; for(let p of pathArr) { let next = curr.children.find(c => c.name === p); if(!next) return null; curr = next; } return curr; };

    if (cType === 'MODIFY') {
        const propName = pathParts.pop(); let target = findNode(pathParts);
        if(target) {
            let valNode = xml.getElementsByTagName('value')[0]; let val = valNode ? getDeepValue(valNode) : "";
            if(ADITO_PROCESS_NAMES.has(propName)) {
                target.coreProcContents[propName] = target.procContents[propName]; target.procs[propName] = val; 
                let f = project.findFile(val); if(f) {
                    let content = await project.readText(f.fullPath); target.procContents[propName] = content;
                    let errs = checkImports(content, project.knownLibraries); if(errs.length > 0) target.procErrors[propName] = errs;
                }
            } else target.props[propName] = val;
            if(isCustom) target.isCustom = true;
        }
    } else if (cType === 'INSERT') {
        const wrappers = xml.getElementsByTagName('modelValueWrapper');
        if (wrappers.length > 0 && wrappers[0].firstElementChild) {
            let inner = Array.from(wrappers[0].childNodes).find(n => n.nodeName === 'value');
            if(inner && inner.firstElementChild) { let target = findNode(pathParts) || rootTree; await parseWalkerAsync(inner, target, fileObj, isCustom, project); }
        }
    } else if (cType === 'DELETE') { let target = findNode(pathParts); if(target) target.isDeleted = true; }
}

function normalizeStr(s) { return (s||"").replace(/\s+/g, ''); }

// --- RENDER HIERARCHY ---
function createUiRow(ind, ic, txt, st, cust, ext, col, id, extraHTML = "") {
    const d = document.createElement('div'); d.className = 'tree-row'; d.style.paddingLeft = `${(ind * 20) + 10}px`; if(id) d.dataset.id = id;
    d.dataset.st = st;
    const isDull = (st === 'E' || st === 'N');
    let sC = 'transparent', bdr = 'none';
    if(st === 'N') sC = '#8b949e'; else if(st === 'D') sC = '#f85149'; else if(st === 'C') sC = '#d29922'; else if(st === 'P') { sC = 'transparent'; bdr = '2px solid #d29922'; } else if(st === 'E') { sC = 'transparent'; bdr = '1px solid #30363d'; }
    const textCol = isDull ? '#8b949e' : '#c9d1d9'; const iconOp = isDull ? '0.6' : '1';
    const bC = cust ? `<span class="badge badge-custom shadow-sm ms-2" style="font-size:9px">CUSTOM</span>` : '';
    const bE = ext ? `<span class="badge shadow-sm ms-1 text-dark" style="font-size:9px; background-color:#ff79c6;">EXT</span>` : '';
    d.innerHTML = `<i class="fa-solid fa-caret-down toggle-icon"></i><span class="status-dot" style="background:${sC}; border:${bdr}; box-sizing: border-box;"></span><i class="fa-solid ${ic} icon-col" style="color:${col}; opacity:${iconOp};"></i><span class="node-text" style="color:${textCol};">${txt} ${bC} ${bE} ${extraHTML}</span>`;
    return d;
}

function createUiNode(o, m, indent) {
    let act = m || o; let st = 'E'; let ignoreTitle = S('ignoreTitleToggle') && S('ignoreTitleToggle').checked;
    
    let propChanged = false; let procChanged = false;
    if(!o && m) st = 'N'; else if(o && !m) st = 'D'; else if(m?.isDeleted) st = 'D';
    else {
        let oProps = {...o?.props}; let mProps = {...m?.props};
        if (ignoreTitle) { delete oProps.title; delete mProps.title; }
        if(JSON.stringify(oProps)!==JSON.stringify(mProps)) propChanged = true;
        
        let allP = new Set([...Object.keys(o?.procContents||{}), ...Object.keys(m?.procContents||{})]);
        for(let p of allP) { if(normalizeStr(o?.procContents[p]) !== normalizeStr(m?.procContents[p])) { procChanged = true; break; } }
        
        if(!propChanged && act.type === 'neonView') { 
            let oTpls = extractTemplates(o?.rawXml); let mTpls = extractTemplates(m?.rawXml);
            if(JSON.stringify(oTpls) !== JSON.stringify(mTpls)) propChanged = true;
        }
        if(propChanged) st = 'C'; else if(procChanged) st = 'P';
    }

    let isCust = m?.isCustom || false; let isExt = m?.isExt || o?.isExt || false;
    let conf = UI_CONFIG[act.type] || { i: 'fa-cube', c: '#8b949e' }; if(isExt) conf = UI_CONFIG.ExtensionPoint;
    
    let cNames = new Set([...(o?.children||[]).map(n=>n.name), ...(m?.children||[]).map(n=>n.name)]);
    let pNames = new Set([...Object.keys(o?.procs||{}), ...Object.keys(m?.procs||{})]);
    
    let sub = document.createElement('div'); sub.className = 'tree-sub';
    let childHasC = false, childHasP = false;

    [...pNames].sort((a,b)=>a.localeCompare(b)).forEach(p => {
        let pst = 'E', op = o?.procContents[p], mp = m?.procContents[p]; 
        if(!op && mp) { pst = 'N'; childHasP = true; } else if(op && !mp) { pst = 'D'; childHasP = true; } else if(normalizeStr(op) !== normalizeStr(mp)) { pst = 'C'; childHasP = true; }
        
        let errs = m?.procErrors?.[p] || o?.procErrors?.[p] || [];
        let errHtml = errs.length > 0 ? `<i class="fa-solid fa-triangle-exclamation text-danger ms-2" title="${errs.join('&#10;')}"></i>` : "";

        let pr = createUiRow(indent+1, 'fa-code', p, pst, isCust, false, '#58a6ff', act.id+'_'+p, errHtml);
        pr.classList.add('no-children'); pr.style.fontStyle = 'italic';
        pr.onclick = (e) => { e.stopPropagation(); activateRow(pr); loadDiff(p, o?.procs[p], m?.procs[p], isCust, m, o); };
        sub.appendChild(pr);
    });

    [...cNames].sort((a,b)=>a.localeCompare(b)).forEach(cn => { 
        let childWrap = createUiNode(o?.children.find(c=>c.name===cn), m?.children.find(c=>c.name===cn), indent+1);
        let cSt = childWrap.querySelector('.tree-row').dataset.st;
        if(cSt === 'C' || cSt === 'D') childHasC = true;
        if(cSt === 'P') childHasP = true;
        if(cSt === 'N' && (st === 'E' || st === 'P')) childHasC = true; 
        sub.appendChild(childWrap); 
    });

    if (st === 'E' || st === 'P') {
        if (childHasC) st = 'C';
        else if (childHasP && st === 'E') st = 'P';
    }

    let extraHtml = "";
    if(act.type === 'neonView') {
        let role = projMod?.viewRoles?.[act.name] || projOrig?.viewRoles?.[act.name];
        if(role) extraHtml += `<span class="badge bg-primary ms-2" style="font-size:9px">${role}</span>`;
        let refs = act.refContexts.length || new Set([ ...(projOrig?.viewRefs[act.name] || []), ...(projMod?.viewRefs[act.name] || []) ]).size;
        if(refs > 0) extraHtml += `<span class="badge bg-secondary ms-2" style="font-size:9px; border:1px solid #30363d;" title="Referenz-Zähler"><i class="fa-solid fa-link"></i> ${refs}</span>`;
    }

    let row = createUiRow(indent, conf.i, act.name, st, isCust, isExt, conf.c, act.id, extraHtml);
    if(!state.treeState.expanded.has(act.id)) row.classList.add('collapsed');

    if(sub.childNodes.length === 0) { row.classList.add('no-children'); row.onclick = () => { activateRow(row); showProps(o, m); }; } 
    else { row.onclick = (e) => { if(e.target.classList.contains('toggle-icon')) { e.stopPropagation(); row.classList.toggle('collapsed'); } else { activateRow(row); showProps(o, m); } }; }

    let wrap = document.createElement('div'); wrap.appendChild(row); wrap.appendChild(sub); return wrap;
}

function renderTree() {
    const cont = S('tree-container'); cont.innerHTML = '';
    let ctxNodeOrig = state.origData.context, ctxNodeMod = state.modData.context;
    let entNodeOrig = state.origData.entity, entNodeMod = state.modData.entity;
    let rootWrap = document.createElement('div'); let parentInd = 0;
    let ignoreTitle = S('ignoreTitleToggle') && S('ignoreTitleToggle').checked;

    let viewsSub = document.createElement('div'); viewsSub.className = 'tree-sub';
    let viewsHasC = false, viewsHasP = false;
    if (state.origData.views.length > 0 || state.modData.views.length > 0) {
        let vNames = new Set([...state.origData.views.map(v=>v.name), ...state.modData.views.map(v=>v.name)]);
        [...vNames].sort((a,b)=>a.localeCompare(b)).forEach(vn => { 
            let childWrap = createUiNode(state.origData.views.find(v=>v.name===vn), state.modData.views.find(v=>v.name===vn), parentInd+1);
            let cSt = childWrap.querySelector('.tree-row').dataset.st;
            if(cSt === 'C' || cSt === 'D' || cSt === 'N') viewsHasC = true;
            if(cSt === 'P') viewsHasP = true;
            viewsSub.appendChild(childWrap); 
        });
    }

    let entSt = 'E'; let ePO = {...entNodeOrig?.props}; let ePM = {...entNodeMod?.props};
    if (ignoreTitle) { delete ePO.title; delete ePM.title; }
    if(JSON.stringify(ePO) !== JSON.stringify(ePM)) entSt = 'C';
    else {
        let allEntProcs = new Set([...Object.keys(entNodeOrig?.procContents||{}), ...Object.keys(entNodeMod?.procContents||{})]);
        for(let p of allEntProcs) { if(normalizeStr(entNodeOrig?.procContents[p]) !== normalizeStr(entNodeMod?.procContents[p])) { entSt = 'P'; break; } }
    }

    let entSub = document.createElement('div'); entSub.className = 'tree-sub';
    let entHasC = false, entHasP = false;

    let entPNames = new Set([...Object.keys(entNodeOrig?.procs||{}), ...Object.keys(entNodeMod?.procs||{})]);
    [...entPNames].sort((a,b)=>a.localeCompare(b)).forEach(p => {
        let pst = 'E', op = entNodeOrig?.procContents[p], mp = entNodeMod?.procContents[p]; 
        if(!op && mp) { pst = 'N'; entHasP = true; } else if(op && !mp) { pst = 'D'; entHasP = true; } else if(normalizeStr(op) !== normalizeStr(mp)) { pst = 'C'; entHasP = true; }
        let errs = entNodeMod?.procErrors?.[p] || entNodeOrig?.procErrors?.[p] || [];
        let errHtml = errs.length > 0 ? `<i class="fa-solid fa-triangle-exclamation text-danger ms-2" title="${errs.join('&#10;')}"></i>` : "";
        let pr = createUiRow(parentInd+1, 'fa-code', p, pst, entNodeMod?.isCustom, false, '#58a6ff', entNodeOrig.id+'_'+p, errHtml);
        pr.classList.add('no-children'); pr.style.fontStyle = 'italic';
        pr.onclick = (e) => { e.stopPropagation(); activateRow(pr); loadDiff(p, entNodeOrig?.procs[p], entNodeMod?.procs[p], entNodeMod?.isCustom, entNodeMod, entNodeOrig); };
        entSub.appendChild(pr);
    });

    DESIGNER_ORDER.forEach(gType => {
        let oNodes = entNodeOrig?.children.filter(c => c.type === gType || (gType==='recordContainer' && c.type.endsWith('RecordContainer'))) || [];
        let mNodes = entNodeMod?.children.filter(c => c.type === gType || (gType==='recordContainer' && c.type.endsWith('RecordContainer'))) || [];
        let allN = new Set([...oNodes.map(n=>n.name), ...mNodes.map(n=>n.name)]); if(allN.size === 0) return;

        let conf = UI_CONFIG[gType] || { i: 'fa-folder', c: '#8b949e', l: gType }; let hdrId = 'hdr_' + gType;
        let hdr = createUiRow(parentInd+1, conf.i, `${conf.l} <span class="badge bg-dark border text-light ms-2" style="font-size:10px">${allN.size}</span>`, 'E', false, false, conf.c, hdrId);
        hdr.classList.add('group-header'); if(!state.treeState.expanded.has(hdrId)) hdr.classList.add('collapsed');

        let sub = document.createElement('div'); sub.className = 'tree-sub';
        [...allN].sort((a,b)=>a.localeCompare(b)).forEach(n => { 
            let childWrap = createUiNode(oNodes.find(x=>x.name===n), mNodes.find(x=>x.name===n), parentInd+2); 
            let cSt = childWrap.querySelector('.tree-row').dataset.st;
            if(cSt === 'C' || cSt === 'D' || cSt === 'N') entHasC = true;
            if(cSt === 'P') entHasP = true;
            sub.appendChild(childWrap); 
        });
        hdr.onclick = () => hdr.classList.toggle('collapsed'); entSub.appendChild(hdr); entSub.appendChild(sub);
    });

    if (entSt === 'E' || entSt === 'P') {
        if (entHasC) entSt = 'C'; else if (entHasP && entSt === 'E') entSt = 'P';
    }

    if (ctxNodeOrig || ctxNodeMod) {
        let cO = ctxNodeOrig, cM = ctxNodeMod; let act = cM || cO;
        let st = 'E'; if(!cO && cM) st = 'N'; else if(cO && !cM) st = 'D'; 
        else {
            let oP = {...cO?.props}; let mP = {...cM?.props};
            if (ignoreTitle) { delete oP.title; delete mP.title; }
            if(JSON.stringify(oP)!==JSON.stringify(mP)) st = 'C';
        }
        if (st === 'E' || st === 'P') {
            if (entSt === 'C' || viewsHasC) st = 'C';
            else if ((entSt === 'P' || viewsHasP) && st === 'E') st = 'P';
        }
        let cRow = createUiRow(0, UI_CONFIG.neonContext.i, act.name, st, false, false, UI_CONFIG.neonContext.c, act.id);
        cRow.onclick = () => { activateRow(cRow); showProps(cO, cM); }; rootWrap.appendChild(cRow); parentInd = 1;
    }

    let rRow = createUiRow(parentInd, UI_CONFIG.entity.i, entNodeOrig.name, entSt, entNodeMod?.isCustom, false, UI_CONFIG.entity.c, entNodeOrig.id);
    if(entSub.childNodes.length === 0) { rRow.classList.add('no-children'); rRow.onclick = () => { activateRow(rRow); showProps(entNodeOrig, entNodeMod); }; }
    else rRow.onclick = (e) => { if(e.target.classList.contains('toggle-icon')) { e.stopPropagation(); rRow.classList.toggle('collapsed'); } else { activateRow(rRow); showProps(entNodeOrig, entNodeMod); } };
    rootWrap.appendChild(rRow); rootWrap.appendChild(entSub); cont.appendChild(rootWrap);

    if (viewsSub.childNodes.length > 0) {
        let vSt = 'E'; if (viewsHasC) vSt = 'C'; else if (viewsHasP) vSt = 'P';
        let hdrId = 'hdr_views'; let hdr = createUiRow(parentInd, UI_CONFIG.neonView.i, `Views`, vSt, false, false, UI_CONFIG.neonView.c, hdrId);
        hdr.classList.add('group-header'); if(!state.treeState.expanded.has(hdrId)) hdr.classList.add('collapsed');
        hdr.onclick = () => hdr.classList.toggle('collapsed'); cont.appendChild(hdr); cont.appendChild(viewsSub);
    }
    
    if(state.treeState.activeId) { let aEl = document.querySelector(`[data-id="${state.treeState.activeId}"]`); if(aEl) aEl.click(); }
}

function toggleAllTree(exp) { document.querySelectorAll('.tree-row:not(.no-children), .group-header').forEach(r => r.classList.toggle('collapsed', !exp)); }
function activateRow(row) { document.querySelectorAll('.tree-row').forEach(r => r.classList.remove('active')); row.classList.add('active'); }

// --- PROPERTIES / DETAILS ---
function showProps(o, m) {
    S('props-view').classList.remove('d-none'); S('diff-view-container').classList.add('d-none'); S('diff-toolbar').classList.add('d-none'); S('debug-banner').classList.add('d-none');
    let act = m || o; let conf = UI_CONFIG[act.type] || { i: 'fa-cube', c: '#8b949e' };
    if(act.isExt) conf = UI_CONFIG.ExtensionPoint;
    
    let b = act.isCustom ? `<span class="badge badge-custom ms-2">CUSTOM</span>` : '';
    S('view-title').innerHTML = `<i class="fa-solid ${conf.i} me-2" style="color:${conf.c}"></i> ${act.name} ${b}`;

    if(act.type === 'neonView') { renderViews(o, m); return; }

    const dict = PROP_DICTIONARY[act.type] || { groups: {}, defaults: {} }; const defs = dict.defaults || {};
    const oP = o?.props || {}, mP = m?.props || {};
    
    let allDictProps = []; for(let g in dict.groups) allDictProps.push(...dict.groups[g]);
    let extraProps = new Set([...Object.keys(oP), ...Object.keys(mP)]); allDictProps.forEach(p => extraProps.delete(p));
    
    const bTbl = (data, comp, isMod) => {
        let h = "";
        const renderRow = (p) => {
            let v = data[p], cv = comp[p]; if(v===undefined && cv===undefined) v = defs[p];
            let isSet = data[p] !== undefined; 
            let propColor = isSet ? '#e6edf3' : '#6e7681'; let propWeight = isSet ? '600' : 'normal'; let valColor = isSet ? '#c9d1d9' : '#6e7681';
            let valH = v !== undefined ? escapeHtml(v) : ``;
            let diff = v !== cv && (data[p]!==undefined || comp[p]!==undefined);
            let bClass = diff ? (isMod && act.isCustom ? "subtle-diff-border-custom" : "subtle-diff-border") : "";
            let tClass = diff ? (isMod && act.isCustom ? 'text-custom fw-bold' : 'text-warning fw-bold') : '';
            return `<tr class="prop-row"><td class="${bClass}" style="width:35%; border-color:#30363d;"><span style="color:${propColor}; font-weight:${propWeight};">${p}</span></td><td class="font-monospace text-break ${tClass}" style="border-color:#30363d; color:${diff?'':valColor};">${valH}</td></tr>`;
        };

        for(const [gName, pList] of Object.entries(dict.groups || {})) {
            let rows = pList.map(p => renderRow(p)).join(''); h += `<div class="prop-box"><div class="prop-box-header">${gName}</div><table class="table table-sm m-0" style="color:#c9d1d9; background:transparent;"><tbody>${rows}</tbody></table></div>`;
        }
        if(extraProps.size > 0) {
            let rows = [...extraProps].sort().map(p => renderRow(p)).join(''); h += `<div class="prop-box"><div class="prop-box-header">Extras</div><table class="table table-sm m-0" style="color:#c9d1d9; background:transparent;"><tbody>${rows}</tbody></table></div>`;
        }
        return h || `<div class="text-secondary p-3">Keine Properties definiert.</div>`;
    };

    S('pane1').innerHTML = `<h6 style="color:#8b949e; text-transform:uppercase; font-size:11px; margin-bottom:10px;">Original Base</h6>` + bTbl(oP, mP, false);
    S('pane2').innerHTML = `<h6 style="color:#8b949e; text-transform:uppercase; font-size:11px; margin-bottom:10px;">Modular Target</h6>` + bTbl(mP, oP, true);
}

const p1 = S('pane1'), p2 = S('pane2'); let isSyncP1 = false, isSyncP2 = false;
p1.onscroll = () => { if(!isSyncP1) { isSyncP2 = true; p2.scrollTop = p1.scrollTop; } isSyncP1 = false; };
p2.onscroll = () => { if(!isSyncP2) { isSyncP1 = true; p1.scrollTop = p2.scrollTop; } isSyncP2 = false; };

function copyViewXml(side) { let xml = state.currentViewXml[side]; if(xml) navigator.clipboard.writeText(xml); }
function toggleAllTemplates(expand) {
    document.querySelectorAll('.view-tpl-table').forEach(tbl => { if(expand) tbl.classList.remove('d-none'); else tbl.classList.add('d-none'); });
    document.querySelectorAll('.tpl-chevron').forEach(i => { if(expand) i.classList.remove('collapsed'); else i.classList.add('collapsed'); });
}
function toggleTemplate(id, chevronId) { S(id).classList.toggle('d-none'); S(chevronId).classList.toggle('collapsed'); }

function generateTplTable(tpl, compTpl, isMod, actIsCustom) {
    let props = tpl.props; let compProps = compTpl ? compTpl.props : {};
    let allProps = new Set([...Object.keys(props), ...Object.keys(compProps)]);
    let tProps = "";
    [...allProps].sort().forEach(p => {
        let v = props[p]; let cv = compProps[p];
        if(v === undefined && isMod) return; 
        let isDiff = v !== cv && (v!==undefined && cv!==undefined);
        let bClass = isDiff ? (isMod && actIsCustom ? "subtle-diff-border-custom" : "subtle-diff-border") : "";
        let tClass = isDiff ? (isMod && actIsCustom ? 'text-custom fw-bold' : 'text-warning fw-bold') : '';
        let valH = v !== undefined ? escapeHtml(v) : ``;
        let valColor = (v === undefined) ? '#6e7681' : (isDiff ? '' : '#c9d1d9');
        tProps += `<tr><td class="${bClass}" style="width:30%; border-color:#30363d; color:#8b949e;">${p}</td><td class="font-monospace text-break ${tClass}" style="border-color:#30363d; color:${valColor};">${valH}</td></tr>`;
    });
    return tProps;
}

function renderViews(o, m) {
    state.currentViewXml = { 1: o?.rawXml?.outerHTML || "", 2: m?.rawXml?.outerHTML || "" };
    let act = m || o; let refs = new Set([ ...(projOrig?.viewRefs[act.name] || []), ...(projMod?.viewRefs[act.name] || []) ]);
    
    let refStr = `<div class="prop-box mb-3"><div class="prop-box-header text-info"><i class="fa-solid fa-link"></i> Referenziert von</div><div class="p-2" style="background:#161b22;">`;
    if(refs.size > 0) { refStr += [...refs].sort().map(c => `<span class="badge ${c.startsWith('Context:') ? 'bg-primary' : 'bg-secondary'} me-1 border border-secondary" style="font-size:11px;">${c}</span>`).join(''); } 
    else { refStr += `<span class="text-muted small">Keine bekannten Referenzen in diesem Projekt.</span>`; }
    refStr += `</div></div>`;

    let oTpls = extractTemplates(o?.rawXml); let mTpls = extractTemplates(m?.rawXml);
    let allTplNames = new Set([...Object.keys(oTpls), ...Object.keys(mTpls)]);

    const buildSide = (tpls, compTpls, side, isMod, actIsCustom) => {
        let h = `<div class="list-group list-group-flush rounded-1 border" style="border-color: #30363d !important;">`;
        if(allTplNames.size === 0) return h + `<div class="p-3 text-muted small">Keine Templates</div></div>`;
        
        [...allTplNames].sort().forEach(tName => {
            let tpl = tpls[tName]; let compTpl = compTpls[tName];
            let hash = Math.random().toString(36).substr(2, 9); let collapseId = 'tpl_' + side + '_' + hash; let chevronId = 'chev_' + side + '_' + hash;

            if(!tpl) { h += `<div class="list-group-item p-2" style="background:#161b22; border-color:#30363d; opacity:0.5;"><div class="text-danger fw-bold"><i class="fa-solid fa-minus"></i> Fehlt (in dieser Version)</div></div>`; return; }
            
            let type = tpl.type; let icon = type === 'neonViewReference' ? 'fa-link' : 'fa-layer-group';
            let isDiff = false; if(!compTpl) isDiff = true; else if(JSON.stringify(tpl.props) !== JSON.stringify(compTpl.props)) isDiff = true;
            let titleCol = isDiff ? (isMod && actIsCustom ? '#d2a8ff' : '#d29922') : '#58a6ff';
            let tProps = generateTplTable(tpl, compTpl, isMod, actIsCustom);
            
            h += `<div class="list-group-item p-0 view-tpl-header" style="background:#161b22; border-color:#30363d;">
                    <div class="p-2 d-flex align-items-center" onclick="toggleTemplate('${collapseId}', '${chevronId}')">
                        <i id="${chevronId}" class="fa-solid fa-chevron-down tpl-chevron collapsed me-2 text-secondary"></i>
                        <div><div class="fw-bold" style="color:${titleCol}"><i class="fa-solid ${icon} me-1"></i> ${tName}</div><div class="small text-secondary font-monospace" style="font-size:10px;">${type}</div></div>
                    </div><table id="${collapseId}" class="table table-sm table-dark d-none m-0 view-tpl-table" style="font-size:11px; background:#0d1117;"><tbody>${tProps}</tbody></table>
                  </div>`;
        });
        return h + '</div>';
    };

    let ctrlBar = `<div class="mb-2"><button class="btn btn-sm btn-outline-secondary py-0 me-1" onclick="toggleAllTemplates(true)"><i class="fa-solid fa-expand"></i> Alle</button><button class="btn btn-sm btn-outline-secondary py-0" onclick="toggleAllTemplates(false)"><i class="fa-solid fa-compress"></i> Alle</button></div>`;
    S('pane1').innerHTML = refStr + `<div class="d-flex justify-content-between align-items-center mb-2"><h6 class="m-0" style="color:#8b949e">Original Templates & Refs</h6><button class="btn btn-sm btn-outline-secondary py-0" onclick="copyViewXml(1)"><i class="fa-solid fa-code"></i> Copy XML</button></div>` + ctrlBar + buildSide(oTpls, mTpls, 1, false, false);
    S('pane2').innerHTML = refStr + `<div class="d-flex justify-content-between align-items-center mb-2"><h6 class="m-0" style="color:#8b949e">Modular Templates & Refs</h6><button class="btn btn-sm btn-outline-secondary py-0" onclick="copyViewXml(2)"><i class="fa-solid fa-code"></i> Copy XML</button></div>` + ctrlBar + buildSide(mTpls, oTpls, 2, true, act.isCustom);
}

// --- DIFF VIEW ---
function toggleDebugBanner() { S('debug-banner').classList.toggle('d-none'); }
function copyPath(side) { let p = S('debug-path-'+side).textContent; if(p && p!=='...') navigator.clipboard.writeText(p); }

async function loadDiff(pName, pOrig, pMod, isCustomMod, targetNode, origNode) {
    S('props-view').classList.add('d-none'); S('diff-view-container').classList.remove('d-none'); S('diff-toolbar').classList.remove('d-none'); S('diff-toolbar').classList.add('d-flex');
    S('view-title').innerHTML = `<i class="fa-solid fa-code me-2" style="color:#58a6ff"></i> Diff: ${pName}`;
    S('diff-html-target').innerHTML = '<div class="p-5 text-center" style="color:#58a6ff"><i class="fa-solid fa-circle-notch fa-spin fa-2x mb-2"></i><br>Lade Code...</div>';

    let cOrig = origNode?.procContents[pName] || ""; let cMod = targetNode?.procContents[pName] || ""; let cSource = targetNode?.coreProcContents[pName] || cMod; 
    S('debug-path-orig').textContent = pOrig || "Nicht vorhanden";
    state.diffViewInfo = { origCode: cOrig, modCode: cMod, sourceCode: cSource, name: pName, pOrig: pOrig, pMod: pMod, isCustomMod: isCustomMod, targetNode: targetNode };
    
    if(isCustomMod && targetNode && targetNode.coreProcContents[pName]) S('mode-toggle').classList.remove('d-none'); else S('mode-toggle').classList.add('d-none');
    setDiffMode(isCustomMod ? 'custom' : 'core');
}

async function reloadCurrentProcess() {
    if(state.diffViewInfo) {
        let { name, pOrig, pMod, isCustomMod, targetNode } = state.diffViewInfo;
        if(pOrig) { let f = projOrig.findFile(pOrig); if(f) state.diffViewInfo.origCode = await projOrig.readText(f.fullPath); }
        if(pMod) { let f = projMod.findFile(pMod); if(f) { state.diffViewInfo.modCode = await projMod.readText(f.fullPath); targetNode.procContents[name] = state.diffViewInfo.modCode; } }
        let mode = S('btn-mode-custom').classList.contains('btn-custom') ? 'custom' : 'core'; setDiffMode(mode);
    }
}

async function setDiffMode(mode) {
    if(!state.diffViewInfo) return;
    if(state.diffViewInfo.isCustomMod) { S('btn-mode-core').className = mode === 'core' ? 'btn btn-secondary' : 'btn btn-outline-secondary'; S('btn-mode-custom').className = mode === 'custom' ? 'btn btn-custom' : 'btn btn-outline-custom'; }

    let c1 = state.diffViewInfo.origCode; let c2 = mode === 'custom' ? state.diffViewInfo.modCode : state.diffViewInfo.sourceCode;
    let activeModPath = mode === 'custom' ? state.diffViewInfo.pMod : (state.diffViewInfo.targetNode?.coreProcs?.[state.diffViewInfo.name] || state.diffViewInfo.pMod);
    S('debug-path-mod').textContent = activeModPath || "Nicht vorhanden";

    try { if(c1) c1 = await prettier.format(c1, { parser: "babel", plugins: prettierPlugins }); if(c2) c2 = await prettier.format(c2, { parser: "babel", plugins: prettierPlugins }); } catch(e){}

    if (normalizeStr(c1) === normalizeStr(c2) && c1 !== "") {
        S('diff-html-target').innerHTML = `<div class="alert alert-success m-3 bg-dark border-success text-success d-flex align-items-center gap-2 shadow-sm" style="background:#161b22 !important;"><i class="fa-solid fa-check-circle"></i> <strong>Code ist identisch.</strong></div><div class="p-3 bg-dark"><pre><code class="language-javascript" style="background: transparent;">${escapeHtml(c1)}</code></pre></div>`;
        hljs.highlightElement(S('diff-html-target').querySelector('code')); return;
    }
    const ds = Diff.createTwoFilesPatch("Original", mode==="custom" ? "Modular Target (Custom)" : "Modular Target (Core)", c1, c2, "", "", { context: 99999 });
    S('diff-html-target').innerHTML = '';
    const ui = new Diff2HtmlUI(S('diff-html-target'), ds, { drawFileList: false, matching: 'words', outputFormat: 'side-by-side', colorScheme: 'dark' }, hljs);
    ui.draw(); ui.highlightCode();
}

function copySource(id) { 
    if(state.diffViewInfo) {
        let mode = S('btn-mode-custom').classList.contains('btn-custom') ? 'custom' : 'core';
        let code = id === 1 ? state.diffViewInfo.origCode : (mode === 'custom' ? state.diffViewInfo.modCode : state.diffViewInfo.sourceCode);
        navigator.clipboard.writeText(code);
        const btn = S('copy-btn-'+id); const origHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-check"></i> Kopiert'; btn.classList.add('text-success', 'border-success');
        setTimeout(() => { btn.innerHTML = origHtml; btn.classList.remove('text-success', 'border-success'); }, 2000);
    }
}
S('resizer').onmousedown = () => { document.onmousemove = e => { let pct = ((e.clientX - S('sidebar').offsetWidth) / S('content-view').offsetWidth) * 100; S('pane1').style.flex = `0 0 ${Math.max(10, Math.min(90, pct))}%`; }; document.onmouseup = () => document.onmousemove = null; };
</script>
</body>
